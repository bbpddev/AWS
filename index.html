<body>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; }

  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface-2: #F3EFE8;
    --border: #E4DDD1;
    --border-strong: #D3C9B8;
    --text: #1B2430;
    --muted: #5C6672;
    --faint: #8A93A0;
    --accent: #F59E0B;
    --accent-ink: #B45309;
    --accent-wash: #FBEBD1;
    --good: #0E9F6E;
    --good-ink: #0B7F58;
    --good-wash: #E1F5EC;
    --bad: #DC2626;
    --bad-ink: #B01919;
    --bad-wash: #FBE6E6;
    --shadow: 0 1px 2px rgba(27,36,48,.06), 0 8px 24px -12px rgba(27,36,48,.18);
    --shadow-lg: 0 2px 4px rgba(27,36,48,.06), 0 24px 48px -20px rgba(27,36,48,.28);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131A24;
      --surface: #1B2432;
      --surface-2: #222E3E;
      --border: #2C3849;
      --border-strong: #3A4a5f;
      --text: #EDF1F6;
      --muted: #97A3B4;
      --faint: #6B7788;
      --accent: #FF9900;
      --accent-ink: #FFB84D;
      --accent-wash: #35291470;
      --good: #34D399;
      --good-ink: #6EE7B7;
      --good-wash: #10352840;
      --bad: #F87171;
      --bad-ink: #FCA5A5;
      --bad-wash: #3a1a1a60;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px -12px rgba(0,0,0,.6);
      --shadow-lg: 0 2px 4px rgba(0,0,0,.35), 0 30px 60px -24px rgba(0,0,0,.7);
    }
  }
  :root[data-theme="light"] {
    --bg: #FAF8F4; --surface: #FFFFFF; --surface-2: #F3EFE8; --border: #E4DDD1;
    --border-strong: #D3C9B8; --text: #1B2430; --muted: #5C6672; --faint: #8A93A0;
    --accent: #F59E0B; --accent-ink: #B45309; --accent-wash: #FBEBD1;
    --good: #0E9F6E; --good-ink: #0B7F58; --good-wash: #E1F5EC;
    --bad: #DC2626; --bad-ink: #B01919; --bad-wash: #FBE6E6;
    --shadow: 0 1px 2px rgba(27,36,48,.06), 0 8px 24px -12px rgba(27,36,48,.18);
    --shadow-lg: 0 2px 4px rgba(27,36,48,.06), 0 24px 48px -20px rgba(27,36,48,.28);
  }
  :root[data-theme="dark"] {
    --bg: #131A24; --surface: #1B2432; --surface-2: #222E3E; --border: #2C3849;
    --border-strong: #3A4a5f; --text: #EDF1F6; --muted: #97A3B4; --faint: #6B7788;
    --accent: #FF9900; --accent-ink: #FFB84D; --accent-wash: #35291470;
    --good: #34D399; --good-ink: #6EE7B7; --good-wash: #10352840;
    --bad: #F87171; --bad-ink: #FCA5A5; --bad-wash: #3a1a1a60;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px -12px rgba(0,0,0,.6);
    --shadow-lg: 0 2px 4px rgba(0,0,0,.35), 0 30px 60px -24px rgba(0,0,0,.7);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 12% -10%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 42%);
  }

  .wrap { max-width: 780px; margin: 0 auto; padding: 22px 20px 72px; }

  /* ---- top bar ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand .logo {
    font-family: var(--mono); font-weight: 700; font-size: 15px; letter-spacing: .5px;
    color: #fff; background: linear-gradient(160deg, #FF9900, #EC7211);
    padding: 4px 8px; border-radius: 6px; line-height: 1; box-shadow: var(--shadow);
  }
  .crumb { font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crumb b { color: var(--text); }
  .theme-btn {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 12px; cursor: pointer; transition: color .15s, border-color .15s;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* ---- cards ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 26px;
  }
  .eyebrow { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-ink); font-weight: 600; }
  h1 { font-size: clamp(24px, 5vw, 33px); line-height: 1.12; margin: 10px 0 8px; letter-spacing: -.02em; text-wrap: balance; }
  .lead { color: var(--muted); font-size: 15px; margin: 0; max-width: 60ch; }

  .facts { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 4px; }
  .fact { font-family: var(--mono); font-size: 12px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 11px; }
  .fact b { color: var(--text); font-weight: 600; }

  .setup { display: flex; flex-direction: column; gap: 22px; margin-top: 26px; }
  .field-label { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); font-weight: 600; margin-bottom: 10px; }

  /* segmented */
  .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px; }
  .seg button {
    font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--muted);
    background: transparent; border: 0; border-radius: 7px; padding: 8px 16px; cursor: pointer; transition: all .15s;
  }
  .seg button .sub { display: block; font-family: var(--mono); font-weight: 400; font-size: 11px; color: var(--faint); margin-top: 2px; }
  .seg button[aria-pressed="true"] { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .seg button[aria-pressed="true"] .sub { color: var(--accent-ink); }

  /* domain toggles */
  .domains { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 520px) { .domains { grid-template-columns: 1fr; } }
  .dom {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px;
    padding: 12px 14px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .dom:hover { border-color: var(--border-strong); }
  .dom[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-wash); }
  .dom .box {
    width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border-strong);
    flex: none; display: grid; place-items: center; transition: all .15s;
  }
  .dom[aria-pressed="true"] .box { background: var(--accent); border-color: var(--accent); }
  .dom .box svg { width: 12px; height: 12px; opacity: 0; }
  .dom[aria-pressed="true"] .box svg { opacity: 1; }
  .dom .meta { min-width: 0; }
  .dom .nm { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .dom .wt { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .len-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--muted);
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 14px; cursor: pointer; transition: all .15s;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip[aria-pressed="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* buttons */
  .btn {
    font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer;
    border-radius: 11px; padding: 13px 22px; border: 1px solid transparent; transition: transform .08s, filter .15s, background .15s, border-color .15s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: linear-gradient(160deg, #FF9900, #EC7211); color: #201400; box-shadow: var(--shadow); }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; filter: none; }
  .btn-ghost { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn-ghost:hover { border-color: var(--muted); }
  .btn-block { width: 100%; }

  /* ---- quiz ---- */
  .qhead { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .qcount { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .qcount b { color: var(--text); font-size: 16px; }
  .qright { display: flex; align-items: center; gap: 10px; }
  .timer { font-family: var(--mono); font-size: 13px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-variant-numeric: tabular-nums; }
  .dchip { font-family: var(--mono); font-size: 11px; letter-spacing: .3px; color: var(--accent-ink); background: var(--accent-wash); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); border-radius: 7px; padding: 4px 9px; font-weight: 600; }

  .track { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-bottom: 24px; border: 1px solid var(--border); }
  .track .fill { height: 100%; background: linear-gradient(90deg, #EC7211, #FF9900); border-radius: 999px; transition: width .4s cubic-bezier(.22,1,.36,1); }

  .qtext { font-size: clamp(18px, 3.2vw, 21px); font-weight: 600; line-height: 1.35; letter-spacing: -.01em; margin: 0 0 6px; text-wrap: pretty; }
  .qhint { font-family: var(--mono); font-size: 12px; color: var(--faint); margin: 0 0 18px; }

  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; align-items: flex-start; gap: 13px; text-align: left; width: 100%;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 15px; cursor: pointer; color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.4;
    transition: border-color .15s, background .15s, transform .08s;
  }
  .opt:hover:not(:disabled) { border-color: var(--border-strong); }
  .opt:active:not(:disabled) { transform: translateY(1px); }
  .opt .key {
    font-family: var(--mono); font-size: 13px; font-weight: 700; flex: none;
    width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); transition: all .15s;
  }
  .opt .txt { padding-top: 2px; }
  .opt[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-wash); }
  .opt[aria-pressed="true"] .key { background: var(--accent); border-color: var(--accent); color: #201400; }
  .opt.correct { border-color: var(--good); background: var(--good-wash); }
  .opt.correct .key { background: var(--good); border-color: var(--good); color: #05231a; }
  .opt.wrong { border-color: var(--bad); background: var(--bad-wash); }
  .opt.wrong .key { background: var(--bad); border-color: var(--bad); color: #2a0808; }
  .opt:disabled { cursor: default; }
  .opt .mark { margin-left: auto; font-family: var(--mono); font-size: 11px; font-weight: 700; padding-top: 4px; }
  .opt.correct .mark { color: var(--good-ink); }
  .opt.wrong .mark { color: var(--bad-ink); }

  .explain {
    margin-top: 16px; border-radius: 12px; padding: 15px 16px; font-size: 14.5px; line-height: 1.5;
    border: 1px solid; background: var(--surface-2);
  }
  .explain.ok { border-color: color-mix(in srgb, var(--good) 40%, transparent); background: var(--good-wash); }
  .explain.no { border-color: color-mix(in srgb, var(--bad) 40%, transparent); background: var(--bad-wash); }
  .explain .verdict { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
  .explain.ok .verdict { color: var(--good-ink); }
  .explain.no .verdict { color: var(--bad-ink); }
  .explain p { margin: 0; color: var(--text); }
  .explain .svc { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 8px; }

  .qnav { display: flex; gap: 12px; margin-top: 22px; }

  /* ---- results ---- */
  .score-hero { text-align: center; padding: 8px 0 4px; }
  .ring-wrap { position: relative; width: 168px; height: 168px; margin: 6px auto 4px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-num { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
  .ring-num .pct { font-family: var(--mono); font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1; font-variant-numeric: tabular-nums; }
  .ring-num .pts { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 5px; }
  .verdict-badge { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .5px; padding: 8px 16px; border-radius: 999px; margin-top: 6px; }
  .verdict-badge.pass { color: var(--good-ink); background: var(--good-wash); border: 1px solid color-mix(in srgb, var(--good) 40%, transparent); }
  .verdict-badge.fail { color: var(--bad-ink); background: var(--bad-wash); border: 1px solid color-mix(in srgb, var(--bad) 40%, transparent); }
  .result-sub { color: var(--muted); font-size: 14px; margin: 12px auto 0; max-width: 48ch; }

  .breakdown { margin-top: 28px; display: flex; flex-direction: column; gap: 15px; }
  .bd-row { }
  .bd-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 10px; }
  .bd-name { font-size: 14px; font-weight: 600; }
  .bd-frac { font-family: var(--mono); font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .bd-track { height: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
  .bd-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.22,1,.36,1); }

  .review { margin-top: 28px; }
  .review h3 { font-size: 15px; margin: 0 0 4px; }
  .review .rsub { font-size: 13px; color: var(--muted); margin: 0 0 16px; font-family: var(--mono); }
  .rq { border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; margin-bottom: 12px; background: var(--surface-2); }
  .rq .rqq { font-size: 14.5px; font-weight: 600; line-height: 1.4; margin: 0 0 10px; }
  .rq .rline { font-size: 13.5px; margin: 4px 0; display: flex; gap: 8px; }
  .rq .rlab { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .5px; flex: none; width: 58px; padding-top: 2px; }
  .rq .rlab.you { color: var(--bad-ink); }
  .rq .rlab.ans { color: var(--good-ink); }
  .rq .rexp { font-size: 13px; color: var(--muted); margin: 10px 0 0; line-height: 1.5; padding-top: 10px; border-top: 1px dashed var(--border-strong); }

  .footer { text-align: center; font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 34px; line-height: 1.7; }
  .footer a { color: var(--muted); }

  .fade { animation: fade .35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

  :focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>

<script>
(function () {
  "use strict";

  // ---------- domains ----------
  var DOMAINS = {
    d1: { code: "D1", name: "Development with AWS Services", weight: 32, color: "#FF9900" },
    d2: { code: "D2", name: "Security", weight: 26, color: "#22C55E" },
    d3: { code: "D3", name: "Deployment", weight: 24, color: "#3B82F6" },
    d4: { code: "D4", name: "Troubleshooting & Optimization", weight: 18, color: "#A855F7" }
  };

  // ---------- question bank ----------
  // answer = array of correct option indices. multi:true when more than one.
  var BANK = [
    // ===== Domain 1: Development (32%) =====
    { d:"d1", q:"A developer needs to expose a single Lambda function as a public HTTPS endpoint to receive webhook calls from a third-party SaaS provider. The company does not need request throttling, usage plans, or request transformation. Which solution meets these requirements with the LEAST operational overhead and cost?",
      o:["Create a Lambda function URL with the appropriate auth type and give the provider the generated HTTPS endpoint","Create a REST API in API Gateway with a Lambda proxy integration, deploy it to a stage, and share the invoke URL","Create an Application Load Balancer with the Lambda function as a target and share the ALB DNS name","Create a CloudFront distribution with Lambda@Edge to process the webhook calls"],
      a:[0], e:"A Lambda function URL is a built-in, dedicated HTTPS endpoint (auth type AWS_IAM or NONE) with no extra services to configure or pay for. API Gateway or an ALB would also work, but both add cost and management for features the scenario explicitly does not need.", svc:"Lambda function URLs" },

    { d:"d1", q:"A Lambda function downloads sensitive customer files, processes them in its /tmp ephemeral storage, and uploads results to S3. The compliance team requires the temporary file contents to be encrypted at rest with a key the company controls, with every key use auditable in CloudTrail. What should the developer do?",
      o:["Call KMS GenerateDataKey with a customer managed key and encrypt the files in the function code before writing them to /tmp","Do nothing, because /tmp contents can never be protected with a customer-controlled key","Attach an encrypted EBS volume to the function and process the files there instead of /tmp","Store the working files as items in a DynamoDB table with default encryption instead of using /tmp"],
      a:[0], e:"Envelope encryption with a customer managed KMS key puts the company in control: every GenerateDataKey and Decrypt call is logged in CloudTrail, and the bytes on /tmp are ciphertext. Lambda cannot attach EBS volumes, and DynamoDB items are capped at 400 KB with an AWS-owned key by default.", svc:"Lambda /tmp + KMS data keys" },

    { d:"d1", q:"A Lambda function running at high concurrency calls AWS Secrets Manager on every invocation to fetch a database credential. The repeated API calls add latency and cost. How can the developer reduce the calls with the LEAST code change?",
      o:["Add the AWS Parameters and Secrets Lambda Extension layer and read the secret from the extension's local cache endpoint","Copy the secret into a plaintext environment variable at deploy time so no runtime call is needed","Store the secret in an S3 object and download it on every invocation instead","Increase the function's memory allocation so the Secrets Manager calls complete faster"],
      a:[0], e:"The AWS Parameters and Secrets Lambda Extension caches secrets inside the execution environment and serves them over a local HTTP endpoint, eliminating repeated Secrets Manager calls without rewriting retrieval logic. A plaintext environment variable exposes the secret and breaks rotation.", svc:"Secrets caching in Lambda" },

    { d:"d1", q:"A machine-learning inference function has a 3 GB model file plus dependencies, far exceeding the 250 MB unzipped Lambda deployment package limit. The team wants to keep using Lambda. What should they do?",
      o:["Package the function and model as a container image of up to 10 GB, push it to Amazon ECR, and create the function from the image","Split the model across multiple Lambda layers to stay under the limit","Open a support ticket to raise the deployment package size limit","Compress the model until the .zip package is under 50 MB"],
      a:[0], e:"Lambda supports container images up to 10 GB stored in ECR — the standard way to ship large models and dependency stacks. Layers count toward the same 250 MB unzipped limit, and the package size limits are hard limits that cannot be raised.", svc:"Lambda container images" },

    { d:"d1", q:"A Lambda function consumes messages from an SQS queue with a batch size of 10. When one message in a batch fails, the entire batch returns to the queue and already-processed messages run again. Which change stops successful messages from being reprocessed while keeping throughput?",
      o:["Enable ReportBatchItemFailures on the event source mapping and return only the failed message IDs from the function","Reduce the batch size to 1 so each invocation handles a single message","Increase the queue's visibility timeout so batches never reappear","Convert the queue to FIFO so batches become exactly-once"],
      a:[0], e:"With partial batch responses (ReportBatchItemFailures), the function reports just the failed item IDs and only those return to the queue. Batch size 1 works but sacrifices throughput, and neither visibility timeout nor FIFO changes the all-or-nothing batch failure behavior.", svc:"Lambda + SQS partial batch responses" },

    { d:"d1", q:"An order service consumes an SQS standard queue with a Lambda function. Because of at-least-once delivery, the same order message is occasionally delivered twice and customers get charged twice. Which solution prevents double processing MOST reliably?",
      o:["Record each order ID in a DynamoDB table with a conditional write and skip processing when the ID already exists","Add a random delay to each invocation so duplicate deliveries are less likely to overlap","Lower the queue's visibility timeout so duplicates expire sooner","Enable long polling on the queue to reduce duplicate deliveries"],
      a:[0], e:"An idempotency check — a conditional PutItem with attribute_not_exists on the order ID — turns the second delivery into a no-op, the standard pattern for at-least-once systems. Polling style and visibility settings cannot eliminate duplicates in standard queues.", svc:"Idempotent consumers" },

    { d:"d1", q:"A Node.js Lambda function creates its database connection and AWS SDK clients inside the handler on every invocation, adding avoidable latency to warm requests. What is the AWS-recommended optimization?",
      o:["Initialize the SDK clients and database connection outside the handler so warm execution environments reuse them across invocations","Increase the function timeout to allow more time for initialization","Publish a new version of the function for every deployment","Invoke the function on a schedule so it never goes cold"],
      a:[0], e:"Code outside the handler runs once per execution environment and its objects persist across warm invocations, so clients and connections belong there. Timeout changes do not reduce per-invocation setup work, and scheduled pings do not fix in-handler initialization.", svc:"Lambda execution environment reuse" },

    { d:"d1", q:"A Lambda-based API scales to hundreds of concurrent executions at peak, and its Amazon RDS for PostgreSQL database intermittently rejects connections because every execution opens its own. Which solution fixes this with the LEAST application refactoring?",
      o:["Put Amazon RDS Proxy between the functions and the database so connections are pooled and shared","Migrate the relational schema to DynamoDB, which has no connection limits","Set the function's reserved concurrency to 1 to serialize access","Open and close a fresh connection inside the handler for every query"],
      a:[0], e:"RDS Proxy maintains a warm, shared connection pool that absorbs Lambda connection storms — usually just a connection-string change. Reserved concurrency of 1 throttles the whole API, and a database migration is a major rewrite.", svc:"Amazon RDS Proxy" },

    { d:"d1", q:"An application uses TransactGetItems to read 3 items per second from a DynamoDB table. Each item is 7 KB. How many read capacity units (RCUs) does this workload consume?",
      o:["12 RCUs","6 RCUs","3 RCUs","24 RCUs"],
      a:[0], e:"A strongly consistent read of a 7 KB item needs ceil(7/4) = 2 RCUs, and transactional reads cost 2x strongly consistent, so 4 RCUs per item. At 3 items per second: 3 x 4 = 12 RCUs.", svc:"DynamoDB transactional RCU math" },

    { d:"d1", q:"A DynamoDB table must support 25 eventually consistent reads per second of items that are 13 KB each. How many RCUs must be provisioned?",
      o:["50 RCUs","100 RCUs","25 RCUs","200 RCUs"],
      a:[0], e:"Each 13 KB item needs ceil(13/4) = 4 RCUs strongly consistent; eventually consistent reads cost half, so 2 RCUs per read. 25 reads x 2 = 50 RCUs.", svc:"DynamoDB RCU math" },

    { d:"d1", q:"An application performs 10 standard writes per second to a DynamoDB table, and each item is 2.5 KB. How many write capacity units (WCUs) are required?",
      o:["30 WCUs","25 WCUs","10 WCUs","60 WCUs"],
      a:[0], e:"Writes cost 1 WCU per 1 KB, rounded up per item: ceil(2.5) = 3 WCUs per write. 10 writes x 3 = 30 WCUs. (Transactional writes would double this to 60.)", svc:"DynamoDB WCU math" },

    { d:"d1", q:"A developer must automatically delete user-session items from a DynamoDB table 30 days after creation and archive each deleted item to Amazon S3 for compliance, without consuming write capacity for the deletions. Which combination achieves this?",
      o:["Enable TTL on an expiry attribute, enable DynamoDB Streams, and use a Lambda consumer that detects TTL-expired records and writes them to S3","Run a nightly Scan that deletes expired items and copies them to S3","Enable point-in-time recovery and restore expired items to S3 every month","Configure an S3 lifecycle rule on the table's backing storage"],
      a:[0], e:"TTL deletes expired items at no write-capacity cost, and each deletion appears in the stream marked as a service deletion (the record's userIdentity identifies dynamodb.amazonaws.com), which a Lambda consumer can filter and archive. A nightly Scan burns heavy read and write capacity.", svc:"DynamoDB TTL + Streams archiving" },

    { d:"d1", q:"A Lambda function processes a DynamoDB stream to keep a search index synchronized. The team must ensure that changes to the SAME item are applied to the index in the order they occurred. What does DynamoDB Streams guarantee?",
      o:["Modifications to a given item appear in the stream in the exact order they occurred, within a shard","All records across the entire table are globally ordered","Ordering is only guaranteed if the table has a single partition","Streams provide no ordering guarantees of any kind"],
      a:[0], e:"DynamoDB Streams preserves per-item modification order — records for the same key are written to the same shard in sequence. There is no global ordering across different items and shards, which is fine for per-item index updates.", svc:"DynamoDB Streams ordering" },

    { d:"d1", q:"A read-heavy gaming leaderboard makes millions of GetItem and Query calls to DynamoDB and needs microsecond response times. The team tolerates eventually consistent reads and does not want to rewrite query code. Which solution fits?",
      o:["Add a DAX cluster and point the existing DynamoDB SDK calls at the DAX endpoint","Add ElastiCache for Redis and implement cache-aside logic throughout the application","Enable global tables to serve reads from additional regions","Raise provisioned RCUs until latency reaches microseconds"],
      a:[0], e:"DAX is an API-compatible, write-through cache for DynamoDB delivering microsecond reads with only a client endpoint change — but it accelerates eventually consistent reads only. ElastiCache demands new caching logic, and no amount of RCUs beats the native single-digit-millisecond floor.", svc:"DynamoDB Accelerator (DAX)" },

    { d:"d1", q:"An orders table uses customer_id as the partition key and order_date as the sort key. A new report must efficiently query all orders for a given product_id, which is a non-key attribute. The table is already serving production traffic. What should the developer create?",
      o:["A global secondary index with product_id as its partition key","A local secondary index with product_id as its sort key","A second table keyed by product_id, kept in sync by a nightly Scan","A Scan with a FilterExpression on product_id"],
      a:[0], e:"A GSI supports a completely different partition key and can be added to a live table. LSIs must reuse the base partition key and only exist if created with the table, while Scan + FilterExpression reads (and pays for) the entire table before filtering.", svc:"DynamoDB GSI vs LSI" },

    { d:"d1", q:"Two support agents can edit the same ticket item in DynamoDB simultaneously, and the last save silently overwrites the other agent's changes. Which approach prevents lost updates WITHOUT locking the item?",
      o:["Keep a version attribute and write with a ConditionExpression requiring the version that was read; handle the failure by re-reading and retrying","Route all writes through a single-threaded worker process to serialize them","Enable strongly consistent reads on every GetItem call","Scan the table before each write to look for recent changes"],
      a:[0], e:"This is optimistic locking: the conditional update fails with ConditionalCheckFailedException if another writer bumped the version first, so no update is silently lost. Strongly consistent reads alone cannot stop a later overwrite.", svc:"Optimistic locking with ConditionExpression" },

    { d:"d1", q:"When a customer redeems loyalty points, the application must decrement a balance in one DynamoDB table and insert a redemption record into another table, with both changes succeeding or failing together. Which API provides this guarantee?",
      o:["TransactWriteItems","BatchWriteItem","Two sequential PutItem calls wrapped in a try/catch block","UpdateItem with a ProjectionExpression"],
      a:[0], e:"TransactWriteItems executes up to 100 write actions across tables as one all-or-nothing ACID transaction. BatchWriteItem is NOT atomic — some writes can succeed while others fail — and sequential calls can leave partial state after a crash.", svc:"DynamoDB transactions" },

    { d:"d1", q:"An application calls the DynamoDB BatchGetItem API directly over HTTP and frequently receives responses containing entries in UnprocessedKeys during traffic peaks. Which TWO actions make the application more resilient? (Choose TWO)",
      o:["Retry the unprocessed keys using exponential backoff with jitter","Use an AWS SDK, which automatically retries unprocessed items with backoff","Retry the entire batch immediately in a tight loop until it succeeds","Increase the provisioned write capacity of the tables involved","Reduce every item to under 1 KB"],
      a:[0,1], multi:true, e:"UnprocessedKeys signals throttling or size limits; the remedies are retrying with exponential backoff plus jitter — which the AWS SDKs implement automatically for batch operations. Tight-loop retries intensify throttling, and write capacity has nothing to do with reads.", svc:"BatchGetItem UnprocessedKeys" },

    { d:"d1", q:"A delivery-tracking mobile app needs a GraphQL API where driver location updates are pushed to subscribed customers in real time, with a managed service maintaining the WebSocket connections. Which AWS service should the developer use?",
      o:["AWS AppSync with GraphQL subscriptions","An API Gateway REST API polled every second by clients","One SQS queue per mobile client","CloudFront with Lambda@Edge functions"],
      a:[0], e:"AppSync is the managed GraphQL service; subscriptions push mutation results to connected clients over WebSockets that AppSync operates and scales. Polling adds latency and cost, and SQS is not a push channel to mobile clients.", svc:"AWS AppSync subscriptions" },

    { d:"d1", q:"An AppSync GraphQL field must first verify a user's entitlement in DynamoDB and then fetch licensed content from a second data source, running the two operations in sequence for a single query. What should the developer configure?",
      o:["A pipeline resolver composed of two functions that run in order","Two separate GraphQL endpoints that the client calls in sequence","A unit resolver attached simultaneously to both data sources","An S3 redirect rule between the data sources"],
      a:[0], e:"Pipeline resolvers chain multiple functions sequentially against different data sources within one field resolution — the check-then-fetch pattern. A unit resolver can target only a single data source.", svc:"AppSync pipeline resolvers" },

    { d:"d1", q:"A field-service mobile app built with AWS Amplify must let technicians view and edit work orders while OFFLINE, then automatically synchronize changes with conflict resolution to the cloud backend when connectivity returns. Which capability provides this?",
      o:["Amplify DataStore backed by an AppSync GraphQL API","Direct DynamoDB SDK calls from the mobile app","S3 Transfer Acceleration for faster uploads","Cognito unauthenticated guest access"],
      a:[0], e:"Amplify DataStore is an on-device store with automatic bidirectional sync and configurable conflict resolution through AppSync — built for offline-first apps. Direct DynamoDB calls simply fail offline and offer no sync engine.", svc:"Amplify DataStore offline sync" },

    { d:"d1", q:"A company serves an API whose consumers all run inside the same AWS Region. The team also plans to put its OWN CloudFront distribution with a custom AWS WAF configuration in front of the API. Which API Gateway endpoint type should they choose?",
      o:["Regional","Edge-optimized","Private","A separate API per Availability Zone"],
      a:[0], e:"Regional endpoints skip the API Gateway managed CloudFront layer — the right choice for same-region callers and required when you attach your own CloudFront distribution. Edge-optimized endpoints bundle a managed CloudFront you cannot customize; private endpoints are reachable only from a VPC.", svc:"API Gateway endpoint types" },

    { d:"d1", q:"A REST API in API Gateway fronts a legacy backend that expects a differently shaped JSON payload than clients send. The transformation must happen WITHOUT changing client or backend code. What should the developer configure?",
      o:["A non-proxy (custom) integration with a VTL mapping template on the integration request","A Lambda proxy integration, which transforms payloads automatically","A gateway response override for the 4xx family","A usage plan with an API key requirement"],
      a:[0], e:"Mapping templates (Velocity Template Language) reshape requests and responses in non-proxy integrations with zero code changes on either side. Proxy integrations pass requests through untouched, forcing the transformation into backend code.", svc:"API Gateway mapping templates" },

    { d:"d1", q:"A team is building a simple, low-latency HTTP front door for a Lambda function. They need built-in JWT authorization against an OpenID Connect provider and the lowest per-request price. They do NOT need usage plans, API keys, or response caching. Which API Gateway option fits?",
      o:["An HTTP API","A REST API","A WebSocket API","A REST API with an edge-optimized endpoint"],
      a:[0], e:"HTTP APIs cost less, add less latency, and include native JWT authorizers for OIDC/OAuth2. REST APIs earn their premium only for features like usage plans, API keys, request validation, and caching — all explicitly unneeded here.", svc:"HTTP API vs REST API" },

    { d:"d1", q:"A SaaS company monetizes its REST API with Basic and Premium tiers that carry different request rates and monthly quotas per customer. Which API Gateway feature implements the tiers?",
      o:["Usage plans with API keys distributed to each customer","Per-customer reserved concurrency on the backing Lambda","A CORS configuration per stage","Stage variables holding each customer's limit"],
      a:[0], e:"Usage plans bind API keys to throttle rates and quotas, giving each customer a measurable tier on REST APIs. Reserved concurrency limits the backend function globally — it cannot distinguish customers.", svc:"API Gateway usage plans" },

    { d:"d1", q:"An e-commerce platform emits order events consumed by several teams: fraud analysis needs only orders over $1,000, notifications needs all orders, and analytics needs orders from one country. Each team owns its own queue or function. Which architecture routes the events with the LEAST custom code?",
      o:["Publish the events to an EventBridge event bus and create one rule per team with an event pattern that filters and routes to that team's target","Publish to a single SQS queue read by a router Lambda that filters and forwards messages","Write every event to DynamoDB and have each team poll the table with filters","Deliver every event to every team and have each consumer discard what it does not need"],
      a:[0], e:"EventBridge rules match event content declaratively and fan out to per-team targets — no router code to write, scale, or debug. A router Lambda or consumer-side discarding moves filtering into code someone must maintain forever.", svc:"EventBridge content-based routing" },

    { d:"d1", q:"A payments system requires transactions for the SAME account to process strictly in order, while transactions for different accounts should process in parallel for throughput. How should the developer configure Amazon SQS?",
      o:["Use a FIFO queue with the account ID as the message group ID","Use a FIFO queue with one global message group ID for every message","Use a standard queue and embed sequence numbers in each payload","Create one standard queue per customer account"],
      a:[0], e:"FIFO ordering applies per message group: keying the group ID by account serializes each account's messages while different groups process concurrently. A single group ID forces global serial processing and destroys throughput.", svc:"SQS FIFO message groups" },

    { d:"d1", q:"Consumers of an SQS standard queue take about 45 seconds to process each message, but the queue's visibility timeout is 30 seconds. Users are reporting duplicated side effects. What is happening, and what is the fix?",
      o:["In-flight messages become visible again before processing finishes and are delivered to another consumer; raise the visibility timeout above worst-case processing time or extend it with ChangeMessageVisibility","The queue is dropping messages under load; attach a dead-letter queue","Short polling is causing duplicates; switch to long polling","The retention period is too short; increase it to the maximum"],
      a:[0], e:"When processing outlives the visibility timeout, SQS re-delivers the message to another consumer — the classic duplicate-processing cause. Set the timeout comfortably above processing time, or heartbeat with ChangeMessageVisibility. Long polling only reduces empty receives.", svc:"SQS visibility timeout tuning" },

    { d:"d1", q:"A single SNS topic receives all inventory events. The shipping service must receive ONLY events where eventType is ORDER_SHIPPED and the billing service only ORDER_PAID, each in its own SQS queue, with no consumer-side filtering code. How is this implemented?",
      o:["Subscribe each queue to the topic and attach a subscription filter policy matching that service's event type attribute","Create one SNS topic per event type and publish every event to all of them","Use a FIFO topic so events are routed by type automatically","Let each service receive everything and drop the messages it does not need"],
      a:[0], e:"SNS subscription filter policies evaluate message attributes and deliver only matching messages to each subscription, preserving fan-out with zero consumer filtering. Duplicating topics multiplies producer logic and cost.", svc:"SNS subscription filter policies" },

    { d:"d1", q:"A data pipeline must run a series of business-rule transformations in strict sequence, retry individual steps on transient errors with backoff, and route failed records into a remediation path. The company wants a scalable solution with the LEAST maintenance. Which service should orchestrate the flow?",
      o:["AWS Step Functions with Retry and Catch configured on each state","A cron job on an EC2 instance running the rules as one script","Lambda functions that invoke each other directly in a chain","A single long-running container that loops over the rules"],
      a:[0], e:"Step Functions expresses sequential states declaratively with built-in Retry (exponential backoff) and Catch (error routing), no servers, and per-step execution history. Chained Lambdas bury orchestration in code where retries and error paths are hard to see and change.", svc:"Step Functions error handling" },

    { d:"d1", q:"A document-approval workflow in Step Functions must pause at a review step until a human approves the document in an external web application — potentially days later — then continue with the result. Which pattern implements the pause?",
      o:["A callback task with waitForTaskToken; the web app resumes the execution by calling SendTaskSuccess with the stored token","An Express workflow containing a long Wait state","A Lambda task that sleeps until the review is complete","A Parallel state that polls the web application every second"],
      a:[0], e:"The .waitForTaskToken service integration pauses the execution until SendTaskSuccess or SendTaskFailure is called with the token — the standard human-in-the-loop pattern (Standard workflows can wait up to a year). Express workflows cap at 5 minutes, and a sleeping Lambda bills for idle time and dies at 15 minutes.", svc:"Step Functions callback pattern" },

    { d:"d1", q:"A clickstream platform must ingest ordered event data that MULTIPLE independent analytics applications will each read in full, with the ability to replay the previous 24 hours of data. Which service meets these requirements?",
      o:["Kinesis Data Streams","An SQS standard queue","An SQS FIFO queue","An SNS topic with queue subscriptions"],
      a:[0], e:"Kinesis retains records (24 hours by default, extensible to 365 days) so multiple consumers independently read and replay the same ordered stream. SQS delivers each message to one consumer and deletes it afterward — no replay and no multi-reader model.", svc:"Kinesis vs SQS" },

    { d:"d1", q:"Five consumer applications read the same Kinesis data stream and now suffer growing read latency because they share each shard's 2 MB/s read throughput. Which change gives EACH consumer dedicated throughput with push-based delivery?",
      o:["Register each application as an enhanced fan-out consumer so each receives a dedicated 2 MB/s per shard via SubscribeToShard","Double the number of shards in the stream","Consolidate all applications behind one shared GetRecords poller","Reduce the stream retention period to lower read contention"],
      a:[0], e:"Enhanced fan-out gives every registered consumer its own 2 MB/s per shard with HTTP/2 push delivery, removing contention between consumers. Adding shards raises aggregate capacity, but standard consumers still share each shard's read limit.", svc:"Kinesis enhanced fan-out" },

    { d:"d1", q:"A web application lets users upload video files of up to 4 GB. The current design posts files through API Gateway to a Lambda function and fails because of payload limits. Which redesign is MOST scalable?",
      o:["Return an S3 presigned URL from the backend and have the browser upload directly to S3, using multipart upload for the large files","Request an API Gateway payload limit increase from AWS Support","Split each file into 5 MB chunks and post every chunk through the Lambda function","Store the videos as binary attributes in DynamoDB"],
      a:[0], e:"Presigned URLs let clients upload directly and securely to S3, bypassing the ~10 MB API Gateway and 6 MB Lambda payload limits entirely; multipart upload adds parallelism and per-part retries. Those payload limits are hard limits, and DynamoDB items cap at 400 KB.", svc:"S3 presigned direct uploads" },

    { d:"d1", q:"A developer lists resources through an AWS SDK call and receives only the first page of results even though thousands more exist. What is the correct way to retrieve the complete result set?",
      o:["Use the SDK's paginators, or loop passing the returned NextToken/continuation token until none is returned","Increase the SDK's socket timeout so more results can arrive","Set MaxResults to an unlimited value in a single call","Sign the request manually with SigV4 to unlock full results"],
      a:[0], e:"List APIs return one page plus a continuation token; paginators (or a token loop) fetch successive pages until the token is absent. MaxResults has service-defined caps, and neither timeouts nor manual signing changes pagination.", svc:"SDK pagination" },

    // ===== Domain 2: Security (26%) =====
    { d:"d2", q:"An application on EC2 must retrieve a chat-service access token that is encrypted at rest and in transit and must ALSO be retrievable by applications in other AWS accounts. Which solution meets the requirements with the LEAST management overhead?",
      o:["Store the token in AWS Secrets Manager encrypted with a customer managed KMS key, attach a resource-based policy to the secret allowing the other accounts, and grant the instance roles permission to read it","Encrypt the token with a KMS key and store the ciphertext in a DynamoDB table that the other accounts query","Store the token in an S3 object encrypted with an AWS managed key and add a bucket policy for the other accounts","Embed the token in each application's configuration and rotate it manually every month"],
      a:[0], e:"Secrets Manager supports cross-account access via a resource policy on the secret — but only when the secret is encrypted with a customer managed key, because the AWS managed key cannot be used cross-account. The DynamoDB and S3 designs can work but leave retrieval, auditing, and rotation for you to build and operate.", svc:"Secrets Manager cross-account" },

    { d:"d2", q:"An application calls a third-party HTTP API using an API key. The key must be manageable from code, and retrieving it must not degrade request performance. Which solution is MOST secure?",
      o:["Store the key in AWS Secrets Manager, retrieve it with the SDK at startup, and cache it in memory between requests","Assign the key to a constant in the source code and keep the code in a private Git repository","Store the key as a private S3 object restricted with IAM policies and fetch it per request","Store the key in a DynamoDB table protected by a resource-based policy"],
      a:[0], e:"Secrets Manager gives KMS encryption, IAM-scoped retrieval, CloudTrail auditing, and managed rotation; caching after the first read removes any performance concern. Code repositories, S3 objects, and DynamoDB rows all lack rotation and leak far more easily.", svc:"Secrets Manager for API keys" },

    { d:"d2", q:"A containerized application on Amazon ECS needs environment-specific configuration — an external API URL, feature flags, and database credentials — for development, test, and production. Values must be centrally managed and picked up WITHOUT rebuilding the container image. Which approach is best?",
      o:["Store configuration in SSM Parameter Store under hierarchical per-environment paths, keep credentials in Secrets Manager, and reference both from the task definition so they inject at container start","Bake a config file for each environment into a separate image tag","Declare all values as ENV instructions in the Dockerfile","Host a config file in a public S3 bucket that containers download at startup"],
      a:[0], e:"ECS task definitions natively reference Parameter Store parameters and Secrets Manager secrets, injecting them as environment variables at start — central management, per-environment paths, encrypted credentials, and no rebuilds. Baking config into images couples every config change to a release.", svc:"ECS + Parameter Store/Secrets Manager" },

    { d:"d2", q:"A web application must let users sign up and sign in with email and password, and after sign-in the app needs TEMPORARY AWS credentials so each user can read their own DynamoDB data directly. Which Cognito combination is required?",
      o:["A user pool for authentication plus an identity pool that exchanges the user pool token for temporary AWS credentials","A user pool alone, because its JWTs already are AWS credentials","An identity pool alone, which provides sign-up and sign-in screens","An IAM user created programmatically for every application user"],
      a:[0], e:"User pools are the identity provider (directory, sign-in, JWTs); identity pools exchange a valid token for temporary, scoped AWS credentials through STS. User pool JWTs cannot call AWS APIs by themselves, and per-user IAM users are an anti-pattern.", svc:"Cognito user vs identity pools" },

    { d:"d2", q:"A consumer application must offer Sign in with Google and Sign in with Apple, while the backend keeps receiving one consistent set of JWTs regardless of how each user signed in. How should the developer configure this?",
      o:["Add Google and Apple as federated identity providers on the Cognito user pool; after federation the pool issues its own tokens to the app","Embed each provider's SDK and send the provider-native tokens straight to the backend","Create an IAM role per social provider for clients to assume","Store social usernames and passwords in the application database"],
      a:[0], e:"A user pool brokers external IdPs: users authenticate with Google or Apple, and Cognito issues its standard ID and access tokens, so the backend validates a single token format. Raw provider tokens would force the backend to integrate and trust every IdP separately.", svc:"Cognito social federation" },

    { d:"d2", q:"An enterprise wants employees to access an internal web application using their existing corporate credentials through the company's SAML 2.0 identity provider, with no new passwords created. What should the developer configure?",
      o:["Add the corporate IdP as a SAML identity provider on the Cognito user pool and map SAML assertion attributes to user pool attributes","Bulk-import all employees into the user pool with temporary passwords","Create IAM users for employees and distribute access keys","Enable unauthenticated guest identities on an identity pool"],
      a:[0], e:"User pools federate with SAML 2.0 IdPs: employees authenticate against the corporate provider, Cognito issues application tokens, and attribute mapping carries identity details across. No new credentials are ever created.", svc:"Cognito SAML federation" },

    { d:"d2", q:"An application uses Cognito user pools and identity pools. Users upload and download their own files (3 KB to 300 MB) in a shared S3 bucket. Which design ensures users can access ONLY their own objects, with the HIGHEST level of security?",
      o:["On the identity pool's authenticated role, scope S3 actions to a per-user prefix using the ${cognito-identity.amazonaws.com:sub} policy variable","Record file ownership in DynamoDB and filter the file list shown in the UI by user ID","Proxy every upload and download through a Lambda function that checks ownership before acting","Use S3 event notifications to validate each upload and download request"],
      a:[0], e:"The IAM policy variable confines each identity to its own key prefix, enforced by AWS authorization itself — nothing in application code to bypass. UI filtering is trivially circumvented with direct API calls, and proxying 300 MB files through Lambda hits payload limits while resting on custom checks.", svc:"Cognito + IAM policy variables" },

    { d:"d2", q:"After a user signs in through a Cognito user pool, a single-page app calls a REST API protected by a Cognito authorizer that validates OAuth scopes. Which token must the app send in the Authorization header?",
      o:["The access token","The ID token","The refresh token","The user's password encoded in Base64"],
      a:[0], e:"The access token carries OAuth scopes and authorizes calls to resource servers — required whenever the authorizer checks scopes. The ID token holds identity claims about the user, and the refresh token exists only to obtain new tokens.", svc:"Cognito token usage" },

    { d:"d2", q:"Members of the Admins group in a Cognito user pool must receive an IAM role with elevated S3 permissions when accessing AWS through the identity pool, while all other users receive a restricted role. How is this achieved?",
      o:["Configure role mapping on the identity pool driven by the cognito:groups claim in the user's token","Create a separate identity pool for admins with no mapping configured","Grant the elevated permissions to the default authenticated role for everyone","Issue long-term IAM access keys to admin users only"],
      a:[0], e:"Identity pools support token-based role mapping: user pool groups carry role ARNs and precedence, and the cognito:groups claim selects which role's credentials are vended. A single over-privileged shared role violates least privilege.", svc:"Cognito role mapping" },

    { d:"d2", q:"A REST API must authorize requests carrying a proprietary bearer token that is validated against an external service, and validation results should be cached briefly to limit calls to that service. Which API Gateway feature implements this?",
      o:["A Lambda authorizer with its authorizer result TTL configured","A Cognito user pool authorizer","IAM authorization with SigV4-signed requests","API keys attached to a usage plan"],
      a:[0], e:"Lambda authorizers run custom validation logic and return an IAM policy that API Gateway caches for a configurable TTL, cutting repeated external validations. Cognito authorizers validate only Cognito tokens, and API keys identify callers but do not authenticate them.", svc:"API Gateway Lambda authorizer" },

    { d:"d2", q:"An HTTP API in API Gateway must validate JWTs issued by a third-party OpenID Connect provider — the issuer URL and audience are known — WITHOUT running any custom authorizer code. What should the developer configure?",
      o:["A JWT authorizer on the HTTP API configured with the issuer and audience","A Lambda authorizer that decodes and verifies the JWT manually","A Cognito identity pool in front of the API","Mutual TLS between clients and the API"],
      a:[0], e:"HTTP APIs include native JWT authorizers: API Gateway fetches the issuer's signing keys and validates signature, expiry, issuer, and audience with no custom code. A Lambda authorizer can do it, but adds code and latency the built-in feature avoids.", svc:"HTTP API JWT authorizer" },

    { d:"d2", q:"A developer must encrypt 500 MB data files with a KMS customer managed key before storing them in S3, but the KMS Encrypt API accepts at most 4 KB of data. What is the correct approach?",
      o:["Call GenerateDataKey, encrypt the file locally with the returned plaintext data key, store the encrypted copy of the data key with the ciphertext, and discard the plaintext key","Split each file into 4 KB chunks and call Encrypt on every chunk","Export the KMS key material and run the encryption offline","Request a KMS payload limit increase from AWS Support"],
      a:[0], e:"This is envelope encryption: KMS protects only the data key while bulk data is encrypted locally; decryption calls KMS Decrypt on the stored encrypted data key. Chunked Encrypt calls are slow and costly, and symmetric KMS key material can never be exported.", svc:"KMS envelope encryption" },

    { d:"d2", q:"Compliance requires the customer managed KMS key protecting an application's data to have its key material rotated yearly, WITHOUT changing the key ARN or re-encrypting existing data. What should the developer do?",
      o:["Enable automatic key rotation on the customer managed key","Create a brand-new key each year and update every reference to it","Re-encrypt all stored data annually under a fresh data key","Switch to an AWS managed key, which the customer rotates on demand"],
      a:[0], e:"Automatic rotation generates new backing material every year while the key ID and ARN stay constant; KMS keeps prior material to decrypt older ciphertext, so nothing is re-encrypted. AWS managed keys rotate on AWS's schedule and give the customer no control.", svc:"KMS automatic rotation" },

    { d:"d2", q:"Account B must decrypt data that was encrypted with a customer managed KMS key owned by Account A. Which configuration enables this?",
      o:["The key policy in Account A must allow Account B, AND the calling principal in Account B needs an IAM policy granting kms:Decrypt on that key's ARN","Only an IAM policy in Account B is needed; key policies play no role","Mark the KMS key as public in Account A","Send Account B an exported copy of the key material"],
      a:[0], e:"Cross-account KMS access requires both sides: the key policy in the owning account must allow the external account, and the caller's IAM policy must grant the action on the key. IAM permissions alone can never reach into another account's key, and symmetric key material cannot be exported.", svc:"KMS cross-account access" },

    { d:"d2", q:"An application must encrypt a 1 KB configuration string and decrypt it later, with the key fully managed in KMS and every single use logged in CloudTrail. What is the SIMPLEST correct approach?",
      o:["Call the KMS Encrypt and Decrypt APIs directly with a customer managed key, since the payload is under 4 KB","Generate a data key and implement full envelope encryption","Store the string as an S3 object with SSE-S3","Base64-encode the string before saving it"],
      a:[0], e:"Payloads up to 4 KB can be encrypted by KMS directly — the simplest path, with every operation appearing in CloudTrail. Envelope encryption is for larger data, and Base64 is an encoding, not encryption.", svc:"KMS direct encryption (<=4 KB)" },

    { d:"d2", q:"A security team requires that use of the key encrypting an S3 bucket's objects be auditable per request in CloudTrail, and that the team can disable the key to instantly revoke all decryption. Which S3 encryption mode meets these requirements?",
      o:["SSE-KMS with a customer managed key","SSE-S3","SSE-C with keys supplied on each request","Client-side Base64 obfuscation of object contents"],
      a:[0], e:"SSE-KMS with a customer managed key logs every key use in CloudTrail, and disabling the key or tightening its policy immediately blocks decryption. SSE-S3 keys are invisible to the customer with no per-request audit, and SSE-C makes you transmit and manage raw keys yourself.", svc:"S3 SSE-KMS" },

    { d:"d2", q:"After an incident in which a developer accidentally attached a public-read policy to a production bucket, the company wants a control that PREVENTS any S3 bucket in the account from ever being made public, regardless of future policies or ACLs. What should be enabled?",
      o:["S3 Block Public Access at the account level","Default encryption on every bucket","S3 Versioning on every bucket","MFA Delete on every bucket"],
      a:[0], e:"Account-level Block Public Access overrides any bucket policy or ACL that would grant public access — a preventive guardrail rather than a cleanup. Encryption, versioning, and MFA Delete protect data integrity but do nothing about public exposure.", svc:"S3 Block Public Access" },

    { d:"d2", q:"A support engineer must share one confidential report from a private S3 bucket with an external auditor for 24 hours. The auditor has no AWS account, and bucket permissions must not change. What should the engineer send?",
      o:["A presigned URL for the object generated with a 24-hour expiry","The bucket ARN together with a cross-account role to assume","A temporarily public object ACL, to be removed the next day","An IAM access key pair scoped to the single object"],
      a:[0], e:"A presigned URL embeds the signer's credentials and an expiry; anyone holding the link can fetch the object until it lapses — no permission changes and no AWS account needed. Note the URL also dies when the signing credentials expire, so sign with sufficiently long-lived credentials.", svc:"S3 presigned URLs" },

    { d:"d2", q:"A streaming site serves thousands of private video segment files per viewing session through CloudFront and must restrict playback to paying subscribers without minting a separate URL for every segment. Which mechanism fits, and how is the origin secured?",
      o:["CloudFront signed cookies for subscriber access, with origin access control (OAC) so the S3 origin only accepts requests from CloudFront","A CloudFront signed URL generated for each individual video segment","A public S3 bucket relying on unguessable object key names","S3 Transfer Acceleration combined with presigned URLs"],
      a:[0], e:"Signed cookies authorize access to many files with one grant — built for HLS/DASH segment streams — while OAC blocks direct S3 access so every request flows through CloudFront's controls. Per-segment signed URLs are impractical at thousands of files per session.", svc:"CloudFront signed cookies + OAC" },

    { d:"d2", q:"An application in Account A must read a DynamoDB table in Account B several times a day. Security mandates temporary credentials and forbids shared long-term keys. What is the correct setup?",
      o:["Create a role in Account B trusting Account A; the application calls STS AssumeRole and reads the table with the temporary credentials returned","Create an IAM user in Account B and store its access keys in Account A's application config","Attach Account A's root user to the table's resource policy","Replicate the table into Account A on a schedule"],
      a:[0], e:"Cross-account access is done by assuming a role: the owning account defines the role and trust policy, and the caller receives short-lived STS credentials scoped to the role's permissions. Shared IAM user keys directly violate the temporary-credentials mandate.", svc:"STS AssumeRole" },

    { d:"d2", q:"A monitoring SaaS vendor assumes an IAM role in each customer's AWS account. A customer wants assurance that the vendor's platform cannot be tricked by ANOTHER customer into assuming this customer's role — the confused deputy problem. What must be added?",
      o:["A unique ExternalId condition in the role's trust policy that the vendor must present on every AssumeRole call","Mandatory MFA on the vendor's root account","A permissions boundary attached to the vendor-facing role","A service control policy denying sts:AssumeRole broadly"],
      a:[0], e:"The ExternalId is a per-customer shared secret checked by the trust policy — the canonical confused-deputy mitigation for third-party role assumption. Boundaries and SCPs shape permissions but cannot bind an assumption to the correct customer context.", svc:"External ID (confused deputy)" },

    { d:"d2", q:"A compliance rule states that objects in an S3 bucket may only ever be accessed over encrypted connections. How does a developer enforce this at the bucket itself?",
      o:["Add a bucket policy statement that denies all S3 actions when the condition aws:SecureTransport is false","Enable SSE-KMS default encryption on the bucket","Enable S3 Versioning with MFA Delete","Attach the bucket to a VPC gateway endpoint"],
      a:[0], e:"A Deny with aws:SecureTransport false rejects any request arriving over plain HTTP, enforcing TLS for the bucket regardless of caller. Default encryption protects data at rest — a different control entirely.", svc:"Enforcing TLS with bucket policy" },

    { d:"d2", q:"A developer's role has a policy allowing s3:GetObject on a bucket, yet requests fail with AccessDenied. A group policy that also applies to the developer contains an explicit Deny for s3:* on that bucket. What is the outcome and why?",
      o:["Access is denied, because an explicit Deny in any applicable policy overrides every Allow","Access is allowed, because the Allow is more specific than the Deny","The result depends on which policy was attached most recently","Access is granted for reads but denied for writes"],
      a:[0], e:"IAM evaluates all applicable policies together, and an explicit Deny always defeats any Allow — specificity and attachment order are irrelevant. The only fix is removing or narrowing the Deny.", svc:"IAM policy evaluation" },

    { d:"d2", q:"Platform engineering lets application teams create their own IAM roles for workloads but must guarantee those roles can NEVER exceed a defined maximum set of permissions — even if a team attaches AdministratorAccess. Which IAM feature enforces this ceiling?",
      o:["Permissions boundaries required on every role the teams create","Resource-based policies on each service the teams use","Inline session policies passed at AssumeRole time","IAM Access Analyzer monitoring"],
      a:[0], e:"A permissions boundary caps effective permissions at the intersection of the boundary and the identity policies, so attaching broader policies grants nothing beyond the boundary. Access Analyzer only reports findings — it enforces nothing.", svc:"IAM permissions boundaries" },

    { d:"d2", q:"A security audit finds long-term IAM access keys stored in configuration files on an EC2 instance that calls S3 and DynamoDB. What is the recommended remediation?",
      o:["Delete the keys and attach an IAM role to the instance through an instance profile so the SDK picks up temporary credentials automatically","Move the keys into an encrypted file on the same instance","Rotate the keys weekly with a scheduled script","Pass the keys through EC2 user data at boot"],
      a:[0], e:"Instance roles supply auto-rotated temporary credentials through the instance metadata service, which the SDKs use automatically — no stored secrets anywhere. Encrypting or rotating stored keys still leaves long-term credentials on the host to leak.", svc:"IAM roles for EC2" },

    { d:"d2", q:"A Lambda function must only put items into a single DynamoDB table named Orders. Which execution role policy follows least privilege?",
      o:["Allow dynamodb:PutItem on the specific Orders table ARN","Allow dynamodb:* on all resources in the account","Allow dynamodb:PutItem on * so future tables keep working","Attach AdministratorAccess to avoid permission debugging"],
      a:[0], e:"Least privilege is the one required action on the one required resource. Wildcarding actions or resources expands the blast radius of a compromised function and fails security review.", svc:"Least-privilege execution roles" },

    { d:"d2", q:"An application on EC2 must connect to Amazon RDS for MySQL WITHOUT storing any database password, authenticating with the instance's IAM role instead. Which feature enables this?",
      o:["IAM database authentication, generating a short-lived authentication token with the SDK for each connection","Placing the database password in EC2 user data","Tunneling connections through a bastion host over SSH","Reading the password from a plaintext .env file at startup"],
      a:[0], e:"With IAM database authentication enabled, the application calls generate-db-auth-token using its role credentials and presents the 15-minute token as the password over TLS — no stored secrets at all. It suits moderate connection rates; heavy connection churn still favors Secrets Manager rotation.", svc:"RDS IAM authentication" },

    { d:"d2", q:"A CodeBuild project must authenticate to Docker Hub during builds, and a hard-coded password in the buildspec was flagged by security. What is the recommended way to supply the credential?",
      o:["Reference it from the buildspec env block using the secrets-manager (or parameter-store SecureString) mapping so it is injected at build time","Commit an .env file containing the password alongside the buildspec","Echo the password into the build from a pipeline environment variable defined in plaintext","Bake the credential into a custom build image"],
      a:[0], e:"Buildspec env supports secrets-manager and parameter-store mappings that resolve values at build time; the secret stays out of source control and is masked in logs. Every alternative persists the credential in plaintext somewhere reviewable.", svc:"CodeBuild secrets injection" },

    { d:"d2", q:"A Lambda function's environment variables hold a third-party API secret. Security requires the values to be encrypted at rest with a customer managed KMS key so that only principals with kms:Decrypt on that key can view them, with usage logged. What should be configured?",
      o:["Set the function to encrypt its environment variables at rest with the customer managed key","Nothing — environment variables are never visible to anyone in the console","Move the secret into the function's code package instead","Base64-encode the values before setting them as variables"],
      a:[0], e:"Lambda encrypts environment variables with KMS; choosing a customer managed key ties console/API visibility to kms:Decrypt on that key and records every use in CloudTrail. With the default service key, anyone who can view the function configuration can read the values.", svc:"Lambda env var encryption" },

    // ===== Domain 3: Deployment (24%) =====
    { d:"d3", q:"A developer wants to unit-test a Lambda function locally against a realistic S3 ObjectCreated event before deploying anything, using the AWS SAM CLI. Which command sequence is correct?",
      o:["sam build, then sam local generate-event s3 put > event.json, then sam local invoke MyFunction -e event.json","sam deploy --guided, then aws lambda invoke against the deployed function","sam init, then sam publish to the Serverless Application Repository","sam validate, then sam logs --tail"],
      a:[0], e:"sam build resolves dependencies, generate-event fabricates a realistic sample payload, and sam local invoke runs the function in a Lambda-like Docker container with that event — all before any deployment. The other sequences either deploy first or never execute the function.", svc:"SAM CLI local testing" },

    { d:"d3", q:"A team develops a serverless REST API defined in a SAM template and wants to iterate on handler code while calling the endpoints from a browser against localhost. Which SAM CLI command provides this?",
      o:["sam local start-api","sam package","sam validate","sam pipeline init"],
      a:[0], e:"sam local start-api runs a local HTTP server that emulates API Gateway routes mapped to the template's functions in Docker, so the API is callable at a localhost URL. package uploads artifacts and validate only lints the template.", svc:"sam local start-api" },

    { d:"d3", q:"On the first deployment of a SAM application, a developer wants the CLI to prompt for the stack name, region, and artifact bucket, then persist those answers so later deployments run non-interactively. Which command does this, and where are the settings saved?",
      o:["sam deploy --guided, which saves the choices to samconfig.toml","sam build, which writes them into .aws-sam/build.toml","aws cloudformation deploy, which stores them in ~/.aws/config","sam init, which records them in template.yaml"],
      a:[0], e:"sam deploy --guided interactively collects deployment settings and writes samconfig.toml; subsequent deploys are simply sam deploy. sam init scaffolds a new project and deploys nothing.", svc:"sam deploy --guided / samconfig.toml" },

    { d:"d3", q:"During active development, a developer wants code changes to a SAM-defined Lambda function to reach the AWS development stack within seconds of saving, without waiting for a full CloudFormation deployment on every change. Which capability provides this?",
      o:["sam sync --watch (AWS SAM Accelerate), which pushes supported code changes directly to the development stack","Running sam deploy inside a shell while-loop","CloudFormation drift detection with auto-remediation","A CodePipeline configured with one-minute polling"],
      a:[0], e:"sam sync --watch observes the project and syncs code-level changes straight to the cloud resources, bypassing full CloudFormation updates for supported changes — near-instant iteration intended for development environments, not production.", svc:"SAM Accelerate (sam sync)" },

    { d:"d3", q:"A YAML template defines AWS::Serverless::Function resources, but deployment fails with an error about unrecognized resource types. What is missing from the template?",
      o:["The Transform: AWS::Serverless-2016-10-31 declaration that expands SAM resources into standard CloudFormation","A Mappings section defining the function runtimes","The AWSTemplateFormatVersion header","An Outputs section exporting the function ARNs"],
      a:[0], e:"SAM is implemented as a CloudFormation macro: the Transform line tells CloudFormation to expand AWS::Serverless::* types into full resources at deploy time. Without it, the serverless types are unknown to the service.", svc:"SAM Transform" },

    { d:"d3", q:"In a SAM template, a function needs create, read, update, and delete access to one DynamoDB table with as little hand-written IAM as possible. What is the recommended approach?",
      o:["Attach the DynamoDBCrudPolicy SAM policy template to the function, parameterized with the table name","Attach the AdministratorAccess managed policy to the execution role","Write a full custom IAM policy document inline for every action","Grant dynamodb:* on all resources in the execution role"],
      a:[0], e:"SAM policy templates are pre-scoped least-privilege snippets — DynamoDBCrudPolicy expands to exactly the CRUD actions on the referenced table. They avoid both over-permissioning and pages of hand-written IAM.", svc:"SAM policy templates" },

    { d:"d3", q:"A team deploying a Lambda function with SAM requires each release to shift 10% of traffic to the new version first, shift the remainder after five minutes, and roll back automatically if a CloudWatch alarm fires during the window. Which template configuration achieves this?",
      o:["AutoPublishAlias on the function plus a DeploymentPreference of type Canary10Percent5Minutes with the alarm listed under Alarms","Timeout and MemorySize raised for the deployment window","ReservedConcurrentExecutions set to 10 percent of expected load","An EventBridge rule that watches CloudFormation deployment events"],
      a:[0], e:"AutoPublishAlias publishes a new version and repoints an alias on each deploy, and DeploymentPreference wires in CodeDeploy to shift traffic canary-style and roll back automatically on the referenced alarms. Concurrency and timeout settings have nothing to do with traffic shifting.", svc:"SAM DeploymentPreference" },

    { d:"d3", q:"Before CodeDeploy shifts ANY production traffic to a new Lambda version, the team must run integration checks against that new version and abort the deployment if they fail. Which mechanism runs the checks?",
      o:["A PreTraffic (BeforeAllowTraffic) hook Lambda function declared in the deployment configuration","A CloudWatch dashboard that an engineer reviews during the deploy","An SQS queue placed between the two function versions","A cron job on a build server that tests after the shift completes"],
      a:[0], e:"Lambda deployments in CodeDeploy support BeforeAllowTraffic and AfterAllowTraffic hooks; the hook function must report success through PutLifecycleEventHookExecutionStatus or the deployment stops and rolls back — the built-in gate for pre-traffic validation.", svc:"CodeDeploy traffic hooks" },

    { d:"d3", q:"A CloudFormation template deploys EC2 instances across many accounts, and the instance type must be restricted to a company-approved list that operators choose from at stack-creation time. How should the template implement this?",
      o:["Define an InstanceType parameter with the approved list set as AllowedValues","Maintain one template per approved instance type","Hard-code the smallest approved type for everyone","Define every type as a separate resource and delete the unused ones afterward"],
      a:[0], e:"A parameter with AllowedValues both prompts the operator and validates the selection at create/update time, keeping a single reusable template. Per-type templates and post-creation cleanup multiply maintenance and cost.", svc:"CloudFormation AllowedValues" },

    { d:"d3", q:"A single CloudFormation template must launch an EC2 instance from a different region-specific AMI ID depending on the region where the stack is created, with no user input. Which template feature selects the correct AMI?",
      o:["A Mappings section keyed by region, read with Fn::FindInMap using the AWS::Region pseudo parameter","A required parameter where the operator types the AMI ID","A Conditions section testing an Environment parameter","An exported Output from another stack"],
      a:[0], e:"Mappings are static lookup tables; Fn::FindInMap combined with AWS::Region resolves the right AMI automatically wherever the stack runs. (An SSM public parameter for the latest AMI is another modern option, but Mappings is the feature designed for this among the choices.)", svc:"CloudFormation Mappings" },

    { d:"d3", q:"Before applying an update to a production CloudFormation stack, a release manager must confirm whether any resource will be REPLACED — deleted and recreated — by the change. What should they generate?",
      o:["A change set, reviewing the planned actions and replacement flags before executing","A stack policy protecting the production resources","A drift detection report on the stack","A copy of the stack in a sandbox account"],
      a:[0], e:"Change sets preview every add, modify, and delete — including whether a modify requires replacement — before anything executes. Drift detection compares deployed state to the template; it does not preview a pending update.", svc:"CloudFormation change sets" },

    { d:"d3", q:"A network stack creates a VPC and subnets that several application stacks in the same account and region must reference. Which native CloudFormation mechanism shares the IDs, and what constraint does it impose?",
      o:["Export the values as Outputs and consume them with Fn::ImportValue; an exported value cannot change or be deleted while any stack imports it","Hard-code the IDs into each application template after the first deploy","Use DependsOn attributes across the stacks","Look the IDs up at runtime with a custom resource in every consumer"],
      a:[0], e:"Cross-stack references (Export plus Fn::ImportValue) are the built-in sharing mechanism, and the lock on in-use exports protects consumers from breaking changes. DependsOn only orders resources within a single stack.", svc:"Cross-stack exports" },

    { d:"d3", q:"A CloudFormation stack includes an RDS database. If the stack is ever deleted, the team requires a final snapshot to be preserved rather than losing the data. Which resource attribute accomplishes this?",
      o:["DeletionPolicy: Snapshot on the RDS resource","DeletionPolicy: Delete on the RDS resource","An UpdatePolicy on the database resource","A stack policy that denies delete actions"],
      a:[0], e:"DeletionPolicy: Snapshot captures a final snapshot when the resource is removed or the stack deleted (supported for RDS, EBS volumes, ElastiCache, and others). Retain would keep the live database running; the default Delete destroys it.", svc:"DeletionPolicy Snapshot" },

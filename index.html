    { d:"d3", q:"A platform team must roll out an identical IAM-and-CloudTrail baseline stack to 40 AWS accounts across three regions from one central operation, including automatic deployment into accounts that join the organization later. Which capability is designed for this?",
      o:["CloudFormation StackSets with service-managed permissions and automatic deployments enabled","A shell script looping create-stack across 120 account-region credential pairs","Nested stacks referenced from each account's template","Change sets executed manually in every account"],
      a:[0], e:"StackSets deploy one template across accounts and regions from a single operation; with service-managed (Organizations) permissions, automatic deployments cover accounts added later. Scripts and manual executions track neither drift nor new accounts.", svc:"CloudFormation StackSets" },

    { d:"d3", q:"A CloudFormation template defines a Lambda function whose Code property points to an S3 bucket and key. A developer uploads new code to the SAME key and updates the stack, but CloudFormation reports no changes and the old code keeps running. Why, and what fixes it?",
      o:["The template itself did not change, so CloudFormation detects nothing to update; reference a new object key per build or an S3ObjectVersion that changes on each upload","S3 replication lag is delaying the new code; retry the update later","The function requires reserved concurrency before accepting new code","Lambda functions can only be updated by deleting and recreating the stack"],
      a:[0], e:"CloudFormation diffs templates, not S3 object contents — identical bucket and key means no detected change. Versioned buckets with S3ObjectVersion, content-hashed keys per build, or SAM/CloudFormation package (which rewrites keys automatically) force the update through.", svc:"Updating Lambda code via CloudFormation" },

    { d:"d3", q:"A team of TypeScript developers wants to define AWS infrastructure in TypeScript using constructs, write unit tests for it, and preview exactly what a release would change in the deployed environment. Which tool and command support the preview?",
      o:["The AWS CDK, using cdk diff to compare the synthesized template against the deployed stack","The AWS SAM CLI, using sam validate","The CloudFormation console template designer","The Elastic Beanstalk CLI, using eb status"],
      a:[0], e:"The CDK defines infrastructure in general-purpose languages and synthesizes CloudFormation; cdk diff shows precisely what a deploy would add, change, or destroy. SAM templates are YAML/JSON, and sam validate only checks syntax.", svc:"AWS CDK / cdk diff" },

    { d:"d3", q:"A CodePipeline release process must pause after the staging deployment so a QA lead explicitly signs off before the production stage runs, with a notification sent when the gate is reached. Which pipeline configuration implements this?",
      o:["A manual approval action between the staging and production stages, publishing to an SNS topic","A longer polling interval configured on the source stage","A CloudWatch alarm attached to the pipeline's execution metric","Two disconnected pipelines that an engineer runs in sequence"],
      a:[0], e:"A manual approval action halts execution until an authorized user approves or rejects (with SNS notification and a seven-day expiry). Nothing else in CodePipeline pauses for human sign-off.", svc:"CodePipeline manual approval" },

    { d:"d3", q:"A build must install dependencies, run unit tests that fail the build on error, package the application, and publish the artifact — all in CodeBuild. Where are these steps defined?",
      o:["In buildspec.yml phases (install, pre_build, build, post_build), with outputs declared in the artifacts section","In appspec.yml lifecycle hook scripts","As inline shell commands typed into the CodePipeline console","In the Dockerfile ENTRYPOINT of the build image"],
      a:[0], e:"buildspec.yml drives CodeBuild: commands run per phase, any non-zero exit fails the build, and the artifacts section defines what is uploaded. appspec.yml belongs to CodeDeploy and controls deployment, not builds.", svc:"CodeBuild buildspec" },

    { d:"d3", q:"An ECS service deploys with CodeDeploy blue/green. Which file tells CodeDeploy the new task definition plus the container name and port to register with the load balancer's target groups during the traffic shift?",
      o:["The AppSpec file for ECS deployments","buildspec.yml in the source repository","The service's Dockerfile","samconfig.toml from the build stage"],
      a:[0], e:"For ECS blue/green, the AppSpec file names the task definition, container, and port that CodeDeploy wires into the target groups as it shifts listener traffic between the blue and green task sets, plus optional lifecycle hooks for validation.", svc:"CodeDeploy ECS AppSpec" },

    { d:"d3", q:"An ECS Fargate task fails at startup because it cannot pull its image from Amazon ECR or write logs to CloudWatch. Once running, the application code must also read from an S3 bucket. Which IAM configuration is correct?",
      o:["Grant ECR pull and CloudWatch Logs permissions to the task EXECUTION role, and S3 read permissions to the task role","Grant all of the permissions to the task role only","Grant all of the permissions to the container instance profile","Grant S3 permissions to the execution role and the ECR permissions to the task role"],
      a:[0], e:"The execution role is used by the ECS agent to pull images, fetch secrets, and ship logs; the task role is what the running application assumes for its own AWS calls. Startup failures around ECR and logs point at the execution role, while app-level S3 access belongs on the task role.", svc:"ECS task role vs execution role" },

    { d:"d3", q:"A developer must push a locally built Docker image to a private Amazon ECR repository. Which sequence is correct?",
      o:["Pipe aws ecr get-login-password into docker login for the registry, docker tag the image with the full repository URI, then docker push","Run docker push directly, because private ECR repositories require no authentication","Upload the image as a tarball to S3 and trigger an ECR import job","Run git push against the repository URI"],
      a:[0], e:"ECR uses token authentication: get-login-password feeds a 12-hour token to docker login, and the image must be tagged with the full registry/repository URI before pushing. The caller also needs ecr:GetAuthorizationToken plus push permissions on the repository.", svc:"Pushing images to ECR" },

    { d:"d3", q:"A company already runs Kubernetes on premises with extensive Helm charts and kubectl tooling. They want to move to AWS, REUSING those manifests and skills, without operating the Kubernetes control plane themselves. Which compute service fits?",
      o:["Amazon EKS","Amazon ECS on Fargate","AWS Elastic Beanstalk","AWS Lambda with container images"],
      a:[0], e:"EKS is managed upstream Kubernetes — existing manifests, Helm charts, and kubectl workflows transfer directly while AWS operates the control plane. ECS uses AWS-proprietary orchestration, which would force a rewrite of all deployment tooling.", svc:"Amazon EKS" },

    { d:"d3", q:"An Elastic Beanstalk production environment must deploy new versions with NO reduction in capacity and NO downtime, and a failed deployment must be discarded without ever touching the instances serving traffic. Deployment cost is a secondary concern. Which deployment policy is best?",
      o:["Immutable","All at once","Rolling","Rolling with additional batch"],
      a:[0], e:"Immutable deployments launch a parallel fleet of new instances and swap in only after health checks pass; a failure simply terminates the new fleet, leaving production untouched. Rolling variants update instances in place, so a bad version reaches live capacity.", svc:"Beanstalk immutable deployments" },

    { d:"d3", q:"On Elastic Beanstalk, a team wants a canary-style release in which 10% of LIVE user traffic is routed to the new application version running on fresh instances, proceeding to full rollout only if the new version stays healthy for an evaluation period. Which deployment policy does this?",
      o:["Traffic splitting","Immutable","All at once","Rolling"],
      a:[0], e:"Traffic-splitting deployments launch the new version on new instances and shift a configurable percentage of load-balancer traffic to them for an evaluation window — Beanstalk's canary. Immutable swaps all traffic at once after health checks, with no percentage phase.", svc:"Beanstalk traffic splitting" },

    { d:"d3", q:"A REST API stage in API Gateway must send 5% of production requests to a NEW deployment for validation, with easy promotion or rollback, WITHOUT creating a second stage or changing any client URLs. Which feature is this?",
      o:["Canary release settings on the stage","Stage variables referencing the new deployment","A usage plan splitting traffic between keys","Migrating the endpoint type to edge-optimized"],
      a:[0], e:"Stage canary settings route a percentage of traffic to a new deployment on the same stage and URL; promoting applies the canary deployment to the stage, and deleting it rolls back. Clients never see a different endpoint.", svc:"API Gateway canary release" },

    { d:"d3", q:"A front-end team wants push-to-deploy from Git for a React single-page application, with automatic builds, hosting on a global CDN, and preview deployments created for every pull request — all fully managed. Which AWS service should they use?",
      o:["AWS Amplify Hosting connected to the Git repository","An S3 bucket synced manually with the AWS CLI","CodeDeploy pushing to EC2 instances running nginx","CloudFormation StackSets publishing to multiple regions"],
      a:[0], e:"Amplify Hosting provides managed Git-based CI/CD — automatic builds on push, CDN-backed hosting, and per-branch and pull-request preview environments — purpose-built for front-end and full-stack web apps.", svc:"AWS Amplify Hosting" },

    // ===== Domain 4: Troubleshooting & Optimization (18%) =====
    { d:"d4", q:"A hybrid application runs on on-premises Linux servers instrumented with the AWS X-Ray SDK, yet no trace data ever reaches the X-Ray console. Which component must run on the servers to collect the SDK's output and relay it to the X-Ray service with the LEAST configuration?",
      o:["The AWS X-Ray daemon, listening on UDP port 2000 and uploading segments to X-Ray with AWS credentials","The CloudWatch Logs agent configured for trace shipping","A scheduled Lambda function that calls PutTraceSegments on the servers' behalf","An AWS Config recorder installed on each server"],
      a:[0], e:"The X-Ray SDK emits segments over local UDP to a daemon process, which batches and uploads them via PutTraceSegments. On premises you must install and run the daemon yourself — without it, the SDK's segments go nowhere.", svc:"X-Ray daemon" },

    { d:"d4", q:"A developer enabled active tracing on a Lambda function, and the function appears in the X-Ray service map — but the DynamoDB and S3 calls it makes are missing as downstream nodes. What must be added?",
      o:["Instrument the AWS SDK clients with the X-Ray SDK (capture/patch the clients) so their calls are recorded as subsegments","Enable CloudTrail data events for DynamoDB and S3","Raise the function's memory so tracing has more resources","Enable DynamoDB Streams on the target table"],
      a:[0], e:"Active tracing traces the invocation itself; downstream services appear only when SDK calls are wrapped by the X-Ray SDK, which records each as a subsegment on the trace. CloudTrail is an audit log and contributes nothing to traces.", svc:"X-Ray SDK instrumentation" },

    { d:"d4", q:"X-Ray tracing costs on an API handling 2,000 requests per second have become too high, but the team still needs statistically representative traces and strong visibility into failing routes. What should they adjust?",
      o:["Create custom sampling rules with a small reservoir and low fixed rate for routine traffic, plus a higher-rate rule matching the error-prone routes","Disable tracing during business hours to halve the cost","Shorten the trace retention window","Trace only requests that hit cold starts"],
      a:[0], e:"Sampling rules (a per-second reservoir plus a fixed percentage, matchable by service, route, and more) cut trace volume while preserving a representative sample, and targeted rules keep richer coverage where problems concentrate. Disabling tracing simply abandons observability.", svc:"X-Ray sampling rules" },

    { d:"d4", q:"Support engineers must locate all X-Ray traces belonging to a specific customer ID by typing filter expressions in the trace console. How should the developer record the customer ID on each trace?",
      o:["As an annotation, because annotations are indexed and usable in filter expressions","As metadata, because metadata is indexed for search","Inside the segment's name string","In a separate DynamoDB lookup table keyed by trace ID"],
      a:[0], e:"Annotations are indexed key-value pairs queryable in filter expressions (annotation.customerId = ...); metadata is stored on the trace but never indexed, so it cannot be searched. Use metadata for bulky context and annotations for searchable keys.", svc:"X-Ray annotations vs metadata" },

    { d:"d4", q:"A Lambda function triggered by S3 object-created events executes successfully but throws an error every time it attempts to write results to a DynamoDB table. The same code works on a developer laptop using admin credentials. What is the MOST likely cause?",
      o:["The function's execution role lacks the required DynamoDB write permissions","The DynamoDB table runs in a different Availability Zone than the function","The table is missing a global secondary index required for writes","The function has exceeded its concurrency limit"],
      a:[0], e:"The trigger fires and the code is proven — what differs in AWS is the execution role, so a missing dynamodb:PutItem/UpdateItem grant (AccessDeniedException) is the classic culprit. DynamoDB is a regional service where AZs are irrelevant, and no index is ever required for writes.", svc:"Lambda execution role troubleshooting" },

    { d:"d4", q:"After a Lambda function was attached to private VPC subnets so it can reach an RDS database, its calls to a third-party HTTPS API on the internet now time out. What is the cause, and what is the fix?",
      o:["VPC-attached functions have no internet path by default; route the private subnets through a NAT gateway (and use VPC endpoints for AWS services)","Lambda can never make outbound HTTPS calls from inside a VPC","The security group needs an inbound rule allowing port 443","The function needs an Elastic IP attached to its network interface"],
      a:[0], e:"In a VPC, Lambda traffic leaves through ENIs in your subnets: without a NAT gateway route there is no path to the internet (interface/gateway endpoints cover AWS services privately). Inbound rules do not affect outbound calls, and EIPs cannot be attached to Lambda ENIs.", svc:"Lambda in a VPC" },

    { d:"d4", q:"Clients of a REST API using Lambda proxy integration intermittently receive HTTP 502 responses, yet the function's logs show it completing without exceptions. What is the MOST likely cause?",
      o:["The function sometimes returns a response that violates the required proxy format — statusCode plus headers and a string body","API Gateway is throttling those particular clients","The 29-second integration timeout is expiring","The clients' API keys have exceeded their quota"],
      a:[0], e:"Proxy integrations demand an exact response shape; returning a raw object, a non-string body, or omitting statusCode produces 502 Bad Gateway even though the code ran fine. Throttling surfaces as 429 and an integration timeout as 504.", svc:"API Gateway 502 diagnosis" },

    { d:"d4", q:"During a marketing campaign, some callers of a REST API receive HTTP 429 responses while other requests succeed normally. What is happening?",
      o:["Requests are exceeding a throttling limit — at the account, stage, method, or usage-plan level — and are being rejected","The backing Lambda function is throwing unhandled exceptions","DNS resolution is failing intermittently for some clients","The stage's cache cluster has filled up"],
      a:[0], e:"429 Too Many Requests is API Gateway throttling against burst or rate limits. Affected clients should retry with backoff, and the team can raise limits, add caching, or introduce usage plans; code errors would return 5xx instead.", svc:"API Gateway throttling" },

    { d:"d4", q:"A Lambda function processing SQS batches occasionally fails one record, which causes the whole batch to retry and some orders to be handled twice. Which TWO changes together make the processing both safe and efficient? (Choose TWO)",
      o:["Enable ReportBatchItemFailures so only the failed records return to the queue","Make the processing idempotent so a redelivered record has no additional effect","Delete every message before processing it to guarantee single handling","Raise the batch size to the maximum to reduce invocation counts","Re-encrypt the queue with a customer managed key"],
      a:[0,1], multi:true, e:"Partial batch responses stop successful records from being retried, and idempotency guards against the duplicates that SQS's at-least-once delivery can still produce. Deleting before processing risks silent data loss, and batch size or encryption changes do not address duplication.", svc:"SQS batch failure handling" },

    { d:"d4", q:"A malformed message repeatedly crashes an SQS consumer; it returns to the queue after every visibility timeout and starves useful work. How should the team automatically isolate such poison messages for later analysis?",
      o:["Configure a redrive policy with a dead-letter queue and a maxReceiveCount so the message moves to the DLQ after repeated receive failures","Purge the queue whenever consumer throughput stalls","Shorten the retention period to one minute so bad messages expire","Wrap the consumer in a catch-all handler that silently discards failures"],
      a:[0], e:"A redrive policy moves any message received more than maxReceiveCount times into the DLQ, unblocking the pipeline while preserving the payload for debugging and optional redrive. Purging destroys good messages, and silent discards lose data invisibly.", svc:"SQS dead-letter queues" },

    { d:"d4", q:"An engineer must determine how many times each distinct error message occurred across dozens of Lambda log groups over the past 24 hours — interactively and without provisioning any new infrastructure. Which tool fits?",
      o:["CloudWatch Logs Insights, querying the selected log groups with filter, parse, and stats aggregations","Downloading all the log streams and searching them locally","The X-Ray service map's error view","An AWS Config resource timeline"],
      a:[0], e:"Logs Insights runs ad-hoc queries — filter, parse, stats count() by field — across many log groups simultaneously, purpose-built for interactive log analysis. Downloading at that scale is impractical, and X-Ray aggregates traces rather than log text.", svc:"CloudWatch Logs Insights" },

    { d:"d4", q:"On-call engineers must be paged whenever the string PaymentDeclined appears more than 50 times within five minutes in an application's CloudWatch log group — with NO changes to the application. Which setup achieves this?",
      o:["A metric filter on the log group counting the pattern, with a CloudWatch alarm on the resulting metric that notifies an SNS topic","A subscription filter streaming the log group into Kinesis Data Firehose","CloudTrail Insights enabled on the account's management events","A Logs Insights query pinned to a CloudWatch dashboard"],
      a:[0], e:"Metric filters convert matching log events into a CloudWatch metric in near real time, and an alarm on that metric pages through SNS. Dashboards and saved queries are passive displays — nobody gets woken up.", svc:"Metric filters + alarms" },

    { d:"d4", q:"A high-throughput Lambda function must publish several custom business metrics on every invocation. Synchronous PutMetricData calls are adding latency and approaching API throttling limits. What is the recommended pattern?",
      o:["Write the metrics into the function's logs in CloudWatch Embedded Metric Format (EMF) and let CloudWatch extract them asynchronously","Batch the PutMetricData calls but keep them inside the request path","Store metric values in DynamoDB and graph them with a custom dashboard app","Aggregate the numbers manually in a weekly spreadsheet"],
      a:[0], e:"EMF-formatted log lines are converted into metrics by CloudWatch automatically — no synchronous API calls, no throttle exposure, full dimension support. It is the recommended pattern for high-volume metric emission from Lambda.", svc:"Embedded Metric Format" },

    { d:"d4", q:"Users complain about occasional very slow responses from an API, yet the team's AVERAGE-latency dashboard looks perfectly healthy. Which alarm configuration will actually detect the problem?",
      o:["An alarm on the p99 latency statistic crossing the SLA threshold","An average-latency alarm evaluated over a longer period","An alarm on total request count","An alarm on the minimum latency statistic"],
      a:[0], e:"Percentile statistics expose tail latency: p99 captures the slowest 1% of requests that averages mathematically hide. Lengthening the averaging window smooths the signal even further away from the user complaints.", svc:"CloudWatch percentile alarms" },

    { d:"d4", q:"A DynamoDB table throttles writes during live sports events even though its total provisioned WCU far exceeds the aggregate write rate. CloudWatch Contributor Insights shows most writes targeting the single partition key value of the current game. What is the BEST fix?",
      o:["Shard the hot partition key — append a random or calculated suffix — so the writes spread across partitions, aggregating on read","Double the table-level WCU again","Enable TTL to remove older items sooner","Add a global secondary index on the game attribute"],
      a:[0], e:"Per-partition throughput is capped regardless of table-level capacity, so one hot key throttles no matter how much you provision. Write sharding across N suffixed keys distributes the load; raising WCU alone cannot fix single-key concentration.", svc:"DynamoDB write sharding" },

    { d:"d4", q:"The GetRecords.IteratorAgeMilliseconds metric for a Lambda function consuming a Kinesis stream climbs steadily through every peak. What does this indicate, and what addresses it?",
      o:["The consumer is falling behind the stream; add shards, raise the event source mapping's parallelization factor, and speed up per-batch processing","Records are being retained too long; shorten the retention period","The producer is writing too slowly; batch its puts","Server-side encryption is delaying reads; disable it"],
      a:[0], e:"Rising iterator age means records wait longer before processing — consumer lag that risks data loss as it approaches the retention limit. More shards, a higher parallelization factor (up to 10 concurrent batches per shard), and faster processing restore pace.", svc:"Kinesis IteratorAge" },

    { d:"d4", q:"A latency-critical checkout API backed by Lambda misses its SLA on the first requests after idle periods and during sudden ramp-ups because of cold starts. Which feature eliminates the initialization delay for a baseline level of traffic?",
      o:["Provisioned concurrency on the function's alias, optionally scheduled higher ahead of known peaks","Reserved concurrency set to the expected peak","A smaller deployment package with fewer dependencies","Invoking the function with a warm-up ping every five minutes"],
      a:[0], e:"Provisioned concurrency keeps execution environments fully initialized so requests skip cold-start setup entirely, and Application Auto Scaling can schedule it around peaks. Reserved concurrency only caps concurrency, and a single ping keeps just one environment warm.", svc:"Provisioned concurrency" },

    { d:"d4", q:"Profiling shows an image-transformation Lambda function is CPU-bound, taking 28 seconds per run at 512 MB of memory. The team wants faster execution and is told the change might not even increase cost. What should they do?",
      o:["Increase the memory setting, which scales vCPU proportionally — often cutting duration enough to offset the higher per-millisecond price","Raise the function timeout to 60 seconds","Add provisioned concurrency to the function","Move the images into a Lambda layer"],
      a:[0], e:"CPU (and network) scale linearly with memory in Lambda, so a CPU-bound function at higher memory finishes disproportionately faster; since billing is memory times duration, cost can stay flat or even drop — verify with the Lambda Power Tuning tool. Timeout only bounds runtime.", svc:"Lambda memory/CPU tuning" },

    { d:"d4", q:"An application calling several AWS APIs sees bursts of 429 throttling and transient 5xx errors at daily peaks, and its current immediate-retry loop is making the situation worse. What is the AWS-recommended client-side remedy?",
      o:["Retries with exponential backoff plus jitter, as implemented by the AWS SDKs' standard and adaptive retry modes","A fixed one-millisecond retry interval for predictability","Treating every throttle as a permanent failure","Duplicating each request in parallel and taking the fastest response"],
      a:[0], e:"Exponential backoff spreads retries out while jitter desynchronizes competing clients, defusing retry storms; the SDKs' standard and adaptive modes implement this (adaptive adds client-side rate limiting). Tight loops and duplicated requests amplify the overload.", svc:"Backoff and jitter" },

    { d:"d4", q:"A global web application serves the same product images and CSS to all users from S3 through its application servers, causing high latency for distant users and unnecessary load on the origin. Which change improves BOTH problems with the LEAST effort?",
      o:["Serve the static assets through a CloudFront distribution with appropriate Cache-Control headers so edge locations cache them close to users","Enable S3 Transfer Acceleration on the assets bucket","Replicate the bucket to five regions and route users by geography","Store the image binaries in DynamoDB global tables"],
      a:[0], e:"CloudFront caches static content at edge locations worldwide, cutting user latency and origin requests at once, tuned via TTLs and Cache-Control. Transfer Acceleration optimizes uploads into S3, and multi-region replication is far more complex for the same outcome.", svc:"CloudFront edge caching" },
  ];

  // ---------- state ----------
  var app = document.getElementById("app");
  var state = {
    mode: "practice",
    selectedDomains: { d1:true, d2:true, d3:true, d4:true },
    length: 20,
    pool: [],
    index: 0,
    responses: [],   // per question: array of selected indices
    revealed: [],    // per question: bool (practice)
    screen: "start",
    startedAt: 0,
    timerId: null
  };
  var KEYS = ["A","B","C","D","E","F"];

  // ---------- helpers ----------
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  function arrEq(a, b) {
    if (a.length !== b.length) return false;
    var x = a.slice().sort(), y = b.slice().sort();
    for (var i = 0; i < x.length; i++) if (x[i] !== y[i]) return false;
    return true;
  }
  function isCorrect(qi) {
    var q = state.pool[qi];
    return arrEq(state.responses[qi] || [], q.a);
  }

  // ---------- start screen ----------
  function renderStart() {
    state.screen = "start";
    app.innerHTML = "";
    var card = el("section", "card fade");

    card.appendChild(el("div", "eyebrow", "AWS Certified Developer &mdash; Associate"));
    card.appendChild(el("h1", null, "DVA-C02 Practice Exam"));
    card.appendChild(el("p", "lead", "Timed, domain-weighted practice questions with worked explanations for every answer. Build a set, sit it like the real thing, then review what you missed."));

    var facts = el("div", "facts");
    ["<b>65</b> questions live", "<b>130</b> min", "pass <b>720&#47;1000</b>", "<b>4</b> domains", BANK.length + " in this bank"].forEach(function (f) {
      facts.appendChild(el("span", "fact", f));
    });
    card.appendChild(facts);

    var setup = el("div", "setup");

    // mode
    var modeField = el("div");
    modeField.appendChild(el("div", "field-label", "Mode"));
    var seg = el("div", "seg");
    seg.setAttribute("role", "group");
    [["practice", "Practice", "instant feedback"], ["exam", "Exam", "score at the end"]].forEach(function (m) {
      var b = el("button", null, m[1] + '<span class="sub">' + m[2] + "</span>");
      b.type = "button";
      b.setAttribute("aria-pressed", state.mode === m[0]);
      b.onclick = function () {
        state.mode = m[0];
        Array.prototype.forEach.call(seg.children, function (c) { c.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      };
      seg.appendChild(b);
    });
    modeField.appendChild(seg);
    setup.appendChild(modeField);

    // domains
    var domField = el("div");
    domField.appendChild(el("div", "field-label", "Domains"));
    var grid = el("div", "domains");
    Object.keys(DOMAINS).forEach(function (k) {
      var d = DOMAINS[k];
      var b = el("button", "dom");
      b.type = "button";
      b.setAttribute("aria-pressed", state.selectedDomains[k]);
      b.innerHTML =
        '<span class="box"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2l2.6 2.6L10 3.2" stroke="#201400" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
        '<span class="meta"><span class="nm">' + esc(d.name) + '</span><span class="wt">' + d.code + " · " + d.weight + "% of exam</span></span>";
      b.onclick = function () {
        var next = !state.selectedDomains[k];
        // keep at least one selected
        var count = Object.keys(state.selectedDomains).filter(function (x) { return state.selectedDomains[x]; }).length;
        if (!next && count <= 1) return;
        state.selectedDomains[k] = next;
        b.setAttribute("aria-pressed", next);
        updateStartBtn();
      };
      grid.appendChild(b);
    });
    domField.appendChild(grid);
    setup.appendChild(domField);

    // length
    var lenField = el("div");
    lenField.appendChild(el("div", "field-label", "Length"));
    var lenRow = el("div", "len-row");
    [10, 20, 40, 65, "All"].forEach(function (n) {
      var b = el("button", "chip", String(n === "All" ? "All (" + BANK.length + ")" : n + " questions"));
      b.type = "button";
      var val = n === "All" ? 999 : n;
      b.setAttribute("aria-pressed", state.length === val);
      b.onclick = function () {
        state.length = val;
        Array.prototype.forEach.call(lenRow.children, function (c) { c.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      };
      lenRow.appendChild(b);
    });
    lenField.appendChild(lenRow);
    setup.appendChild(lenField);

    var startBtn = el("button", "btn btn-primary btn-block", "Start exam &nbsp;→");
    startBtn.type = "button";
    startBtn.id = "startBtn";
    startBtn.onclick = startQuiz;
    setup.appendChild(startBtn);

    card.appendChild(setup);
    app.appendChild(card);
  }

  function updateStartBtn() {
    var b = document.getElementById("startBtn");
    if (!b) return;
    var any = Object.keys(state.selectedDomains).some(function (k) { return state.selectedDomains[k]; });
    b.disabled = !any;
  }

  // ---------- build & start ----------
  function startQuiz() {
    var picked = BANK.filter(function (q) { return state.selectedDomains[q.d]; });
    picked = shuffle(picked);
    var n = Math.min(state.length, picked.length);
    state.pool = picked.slice(0, n).map(function (q) {
      // shuffle options while tracking correct indices
      var order = shuffle(q.o.map(function (_, i) { return i; }));
      var newOpts = order.map(function (i) { return q.o[i]; });
      var newAns = q.a.map(function (ai) { return order.indexOf(ai); });
      return { d: q.d, q: q.q, o: newOpts, a: newAns, multi: !!q.multi, e: q.e, svc: q.svc };
    });
    state.index = 0;
    state.responses = state.pool.map(function () { return []; });
    state.revealed = state.pool.map(function () { return false; });
    state.startedAt = Date.now();
    state.screen = "quiz";
    startTimer();
    renderQuestion();
    window.scrollTo(0, 0);
  }

  // ---------- timer ----------
  function fmt(ms) {
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60);
    var ss = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (ss < 10 ? "0" : "") + ss;
  }
  function startTimer() {
    stopTimer();
    state.timerId = setInterval(function () {
      var t = document.getElementById("timer");
      if (t) t.textContent = fmt(Date.now() - state.startedAt);
    }, 1000);
  }
  function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }

  // ---------- question screen ----------
  function renderQuestion() {
    app.innerHTML = "";
    var qi = state.index;
    var q = state.pool[qi];
    var dom = DOMAINS[q.d];
    var revealed = state.revealed[qi];
    var sel = state.responses[qi];

    var card = el("section", "card fade");

    // header
    var head = el("div", "qhead");
    var count = el("div", "qcount");
    count.innerHTML = "Question <b>" + (qi + 1) + "</b> / " + state.pool.length;
    head.appendChild(count);
    var right = el("div", "qright");
    right.appendChild(el("span", "dchip", dom.code + " · " + esc(dom.name.split(" ")[0])));
    var timer = el("span", "timer", "00:00");
    timer.id = "timer";
    right.appendChild(timer);
    head.appendChild(right);
    card.appendChild(head);

    // progress
    var track = el("div", "track");
    var fill = el("div", "fill");
    fill.style.width = (((qi) / state.pool.length) * 100) + "%";
    track.appendChild(fill);
    card.appendChild(track);

    // question
    card.appendChild(el("h2", "qtext", esc(q.q)));
    card.appendChild(el("p", "qhint", q.multi ? "▸ Select TWO answers" : "▸ Select one answer"));

    // options
    var opts = el("div", "opts");
    q.o.forEach(function (text, i) {
      var b = el("button", "opt");
      b.type = "button";
      var chosen = sel.indexOf(i) !== -1;
      b.setAttribute("aria-pressed", chosen);

      var mark = "";
      if (revealed) {
        b.disabled = true;
        if (q.a.indexOf(i) !== -1) { b.classList.add("correct"); mark = '<span class="mark">✓ correct</span>'; }
        else if (chosen) { b.classList.add("wrong"); mark = '<span class="mark">✗ your pick</span>'; }
      }

      b.innerHTML =
        '<span class="key">' + KEYS[i] + "</span>" +
        '<span class="txt">' + esc(text) + "</span>" + mark;

      if (!revealed) {
        b.onclick = function () { selectOption(qi, i); };
      }
      opts.appendChild(b);
    });
    card.appendChild(opts);

    // explanation (practice, after reveal)
    if (revealed) {
      var ok = isCorrect(qi);
      var ex = el("div", "explain " + (ok ? "ok" : "no"));
      ex.innerHTML =
        '<div class="verdict">' + (ok ? "✓ Correct" : "✗ Not quite") + "</div>" +
        "<p>" + esc(q.e) + "</p>" +
        '<div class="svc">▪ ' + esc(q.svc) + "</div>";
      card.appendChild(ex);
    }

    // nav
    var nav = el("div", "qnav");
    if (state.mode === "practice" && !revealed) {
      var checkBtn = el("button", "btn btn-primary btn-block", "Check answer");
      checkBtn.type = "button";
      checkBtn.disabled = !answerReady(qi);
      checkBtn.id = "primaryBtn";
      checkBtn.onclick = function () {
        if (!answerReady(qi)) return;
        state.revealed[qi] = true;
        renderQuestion();
      };
      nav.appendChild(checkBtn);
    } else {
      var last = qi === state.pool.length - 1;
      var nextBtn = el("button", "btn btn-primary btn-block", last ? "Finish &amp; see results &nbsp;→" : "Next question &nbsp;→");
      nextBtn.type = "button";
      nextBtn.id = "primaryBtn";
      if (state.mode === "exam") nextBtn.disabled = !answerReady(qi);
      nextBtn.onclick = function () {
        if (state.mode === "exam" && !answerReady(qi)) return;
        if (last) { finish(); }
        else { state.index++; renderQuestion(); window.scrollTo(0, 0); }
      };
      nav.appendChild(nextBtn);
    }
    card.appendChild(nav);
    app.appendChild(card);
  }

  function answerReady(qi) {
    var q = state.pool[qi];
    var need = q.a.length;
    return (state.responses[qi] || []).length === need;
  }

  function selectOption(qi, i) {
    var q = state.pool[qi];
    var sel = state.responses[qi];
    var pos = sel.indexOf(i);
    if (q.multi) {
      if (pos !== -1) sel.splice(pos, 1);
      else {
        if (sel.length >= q.a.length) sel.shift(); // keep newest, cap at required count
        sel.push(i);
      }
    } else {
      state.responses[qi] = (pos !== -1) ? [] : [i];
    }
    renderQuestion();
  }

  // ---------- finish / results ----------
  function finish() {
    stopTimer();
    state.screen = "results";
    renderResults();
    window.scrollTo(0, 0);
  }

  function renderResults() {
    app.innerHTML = "";
    var total = state.pool.length;
    var correct = 0;
    var perDomain = {};
    Object.keys(DOMAINS).forEach(function (k) { perDomain[k] = { c: 0, t: 0 }; });

    state.pool.forEach(function (q, qi) {
      perDomain[q.d].t++;
      if (isCorrect(qi)) { correct++; perDomain[q.d].c++; }
    });
    var pct = Math.round((correct / total) * 100);
    // scaled score approximation on AWS 100-1000 range
    var scaled = Math.round(100 + (pct / 100) * 900);
    var passed = pct >= 72;
    var elapsed = fmt(Date.now() - state.startedAt);

    var card = el("section", "card fade");
    card.appendChild(el("div", "eyebrow", "Result &mdash; " + (state.mode === "exam" ? "Exam mode" : "Practice mode")));

    // hero ring
    var hero = el("div", "score-hero");
    var r = 76, c = 2 * Math.PI * r;
    var off = c * (1 - pct / 100);
    var ringColor = passed ? "var(--good)" : "var(--bad)";
    var ring = el("div", "ring-wrap");
    ring.innerHTML =
      '<svg width="168" height="168" viewBox="0 0 168 168" aria-hidden="true">' +
        '<circle cx="84" cy="84" r="' + r + '" fill="none" stroke="var(--surface-2)" stroke-width="12"/>' +
        '<circle cx="84" cy="84" r="' + r + '" fill="none" stroke="' + ringColor + '" stroke-width="12" stroke-linecap="round" ' +
          'stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + c.toFixed(1) + '" style="transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)" id="ringProg"/>' +
      "</svg>" +
      '<div class="ring-num"><div class="pct">' + pct + '%</div><div class="pts">' + correct + " / " + total + " correct</div></div>";
    hero.appendChild(ring);

    var badge = el("div", "verdict-badge " + (passed ? "pass" : "fail"),
      (passed ? "✓ ON TRACK TO PASS" : "✗ BELOW PASS LINE") );
    hero.appendChild(badge);
    hero.appendChild(el("p", "result-sub",
      (passed
        ? "You cleared the ~72% pass mark. Approx. scaled score " + scaled + "/1000. Keep drilling the weaker domains below to build margin."
        : "You're under the ~72% pass mark (approx. scaled " + scaled + "/1000). Focus on the domains and missed questions below, then re-run.")
      + " · Time " + elapsed));
    card.appendChild(hero);

    // per-domain breakdown
    var bd = el("div", "breakdown");
    Object.keys(DOMAINS).forEach(function (k) {
      var d = DOMAINS[k], p = perDomain[k];
      if (p.t === 0) return;
      var dpct = Math.round((p.c / p.t) * 100);
      var row = el("div", "bd-row");
      var top = el("div", "bd-top");
      top.appendChild(el("div", "bd-name", d.code + " · " + esc(d.name)));
      top.appendChild(el("div", "bd-frac", p.c + "/" + p.t + "  (" + dpct + "%)"));
      row.appendChild(top);
      var t = el("div", "bd-track");
      var f = el("div", "bd-fill");
      f.style.width = "0%";
      f.style.background = dpct >= 72 ? "var(--good)" : (dpct >= 50 ? "var(--accent)" : "var(--bad)");
      t.appendChild(f);
      row.appendChild(t);
      bd.appendChild(row);
      setTimeout(function () { f.style.width = dpct + "%"; }, 120);
    });
    card.appendChild(bd);

    // review of missed
    var missed = [];
    state.pool.forEach(function (q, qi) { if (!isCorrect(qi)) missed.push(qi); });
    if (missed.length) {
      var rev = el("div", "review");
      rev.appendChild(el("h3", null, "Review your " + missed.length + " missed question" + (missed.length > 1 ? "s" : "")));
      rev.appendChild(el("p", "rsub", "Read the explanation, then re-run to lock it in."));
      missed.forEach(function (qi) {
        var q = state.pool[qi];
        var yourIdx = (state.responses[qi] || []);
        var yourTxt = yourIdx.length ? yourIdx.map(function (i) { return KEYS[i] + ". " + q.o[i]; }).join("  ·  ") : "(no answer)";
        var ansTxt = q.a.map(function (i) { return KEYS[i] + ". " + q.o[i]; }).join("  ·  ");
        var rq = el("div", "rq");
        rq.innerHTML =
          '<p class="rqq">' + esc(q.q) + "</p>" +
          '<div class="rline"><span class="rlab you">YOU</span><span>' + esc(yourTxt) + "</span></div>" +
          '<div class="rline"><span class="rlab ans">ANSWER</span><span>' + esc(ansTxt) + "</span></div>" +
          '<p class="rexp">' + esc(q.e) + '  <br><span style="opacity:.75">▪ ' + esc(q.svc) + " · " + DOMAINS[q.d].code + "</span></p>";
        rev.appendChild(rq);
      });
      card.appendChild(rev);
    } else {
      var perfect = el("div", "review");
      perfect.appendChild(el("h3", null, "Clean sweep — every question correct."));
      perfect.appendChild(el("p", "rsub", "Raise the length or add tougher domains and go again."));
      card.appendChild(perfect);
    }

    // actions
    var nav = el("div", "qnav");
    if (missed.length) {
      var retry = el("button", "btn btn-ghost", "Retry missed only");
      retry.type = "button";
      retry.onclick = function () { retryMissed(missed); };
      nav.appendChild(retry);
    }
    var again = el("button", "btn btn-primary" + (missed.length ? "" : " btn-block"), "New quiz");
    again.type = "button";
    again.onclick = function () { renderStart(); window.scrollTo(0, 0); };
    nav.appendChild(again);
    card.appendChild(nav);

    app.appendChild(card);
    // animate ring
    requestAnimationFrame(function () {
      setTimeout(function () {
        var rp = document.getElementById("ringProg");
        if (rp) rp.style.strokeDashoffset = off.toFixed(1);
      }, 80);
    });
  }

  function retryMissed(missed) {
    var newPool = missed.map(function (qi) { return state.pool[qi]; });
    // re-shuffle option order for freshness
    state.pool = newPool.map(function (q) {
      var order = shuffle(q.o.map(function (_, i) { return i; }));
      var newOpts = order.map(function (i) { return q.o[i]; });
      var newAns = q.a.map(function (ai) { return order.indexOf(ai); });
      return { d: q.d, q: q.q, o: newOpts, a: newAns, multi: q.multi, e: q.e, svc: q.svc };
    });
    state.index = 0;
    state.responses = state.pool.map(function () { return []; });
    state.revealed = state.pool.map(function () { return false; });
    state.startedAt = Date.now();
    startTimer();
    renderQuestion();
    window.scrollTo(0, 0);
  }

  // ---------- theme toggle ----------
  var root = document.documentElement;
  function currentTheme() {
    if (root.getAttribute("data-theme")) return root.getAttribute("data-theme");
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  document.getElementById("themeBtn").onclick = function () {
    var next = currentTheme() === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
  };

  // ---------- go ----------
  renderStart();
})();
</script>

</body>
</html>
